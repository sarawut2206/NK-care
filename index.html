<meta charset="utf-8">
<title>กบข.นข. — ระบบทะเบียนสัญญาและรับชำระ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#16213C;--soft:#5A6480;--paper:#FBF9F4;--card:#fff;--rule:#DCD8CE;
--red:#C8281E;--gold:#E8B22A;--green:#1F6B4A;--faint:#F1EEE7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans Thai",system-ui,sans-serif;
font-size:14px;padding:20px 16px 70px}
.wrap{max-width:1240px;margin:0 auto}
.mast{display:flex;align-items:flex-end;gap:13px;border-bottom:2px solid var(--ink);padding-bottom:10px}
.flag{display:flex;gap:3px;align-items:flex-end}
.flag i{display:block;width:8px;border-radius:8px 8px 2px 2px}
.flag i:nth-child(1){height:21px;background:var(--red)}
.flag i:nth-child(2){height:29px;background:var(--gold)}
.flag i:nth-child(3){height:25px;background:var(--ink)}
h1{font-family:"Bai Jamjuree",sans-serif;font-weight:700;font-size:21px;line-height:1.15}
.mast small{display:block;font-weight:400;font-size:11.5px;color:var(--soft);margin-top:2px}
.tools{margin-left:auto;display:flex;gap:7px;align-items:center}
.saved{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--soft)}

button{font-family:"Bai Jamjuree",sans-serif;font-weight:600;font-size:13px;background:var(--ink);color:#fff;
border:0;border-radius:7px;padding:8px 13px;cursor:pointer}
button.ghost{background:transparent;color:var(--ink);border:1px solid var(--rule)}
button.sm{font-size:11.5px;padding:5px 9px}
button:focus-visible{outline:2px solid var(--red);outline-offset:2px}
button:disabled{opacity:.4;cursor:default}

nav{display:flex;gap:4px;margin:16px 0 14px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
nav b{font-family:"Bai Jamjuree",sans-serif;font-weight:600;font-size:13.5px;padding:9px 15px;cursor:pointer;
color:var(--soft);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
nav b.on{color:var(--ink);border-bottom-color:var(--red)}
nav b .dot{display:inline-block;min-width:17px;height:17px;line-height:17px;border-radius:9px;background:var(--red);
color:#fff;font-size:10px;text-align:center;margin-left:5px;padding:0 4px;font-family:"IBM Plex Mono",monospace}
section{display:none} section.on{display:block}

.card{background:var(--card);border:1px solid var(--rule);border-radius:9px;padding:14px;margin-bottom:14px}
.eyebrow{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;
color:var(--soft);display:flex;align-items:center;gap:8px;margin:0 0 11px}
.eyebrow::after{content:"";flex:1;height:1px;background:var(--rule)}
.eyebrow>button{order:9}
.hint{font-size:11.5px;color:var(--soft);line-height:1.55}
.hint b{color:var(--ink)}

.grid{display:grid;gap:9px;align-items:end}
label{display:block;font-size:11px;font-weight:600;color:var(--soft);margin-bottom:4px}
input,select,textarea{width:100%;font-family:"IBM Plex Sans Thai",sans-serif;font-size:13px;color:var(--ink);
background:var(--paper);border:1px solid var(--rule);border-radius:6px;padding:7px 8px}
input[type=number]{font-family:"IBM Plex Mono",monospace;text-align:right}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ink);outline-offset:1px}
input.bad{border-color:var(--red);background:#FFF6F5}
textarea{min-height:92px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;line-height:1.5;resize:vertical}

table{border-collapse:collapse;width:100%;font-size:12.5px}
.tbl{background:var(--card);border:1px solid var(--rule);border-radius:9px;overflow:auto}
th,td{padding:6px 8px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--faint)}
th{position:sticky;top:0;background:var(--card);font-family:"IBM Plex Mono",monospace;font-size:9.5px;
letter-spacing:.05em;color:var(--soft);font-weight:500;border-bottom:1.5px solid var(--ink);z-index:2}
td.l,th.l{text-align:left}
tr.grp td{background:var(--paper);font-family:"Bai Jamjuree",sans-serif;font-weight:600;text-align:left;
font-size:12px;color:var(--soft)}
tbody tr:hover td{background:#FCFAF5}
.no{font-family:"IBM Plex Mono",monospace;color:var(--soft);margin-right:5px;font-size:11px}
.amt{font-family:"IBM Plex Mono",monospace}
.pill{display:inline-block;font-size:10px;padding:1px 7px;border-radius:999px;border:1px solid var(--rule);color:var(--soft)}
.pill.red{border-color:rgba(200,40,30,.45);color:var(--red);font-weight:600}
.pill.grn{border-color:rgba(31,107,74,.4);color:var(--green)}
.pill.yel{border-color:rgba(232,178,42,.7);color:#8A6400;font-weight:600}
.del{background:none;border:0;color:var(--red);cursor:pointer;font-size:15px;padding:0 3px}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:9px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--rule);border-radius:9px;padding:10px 12px}
.stat .k{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
.stat .v{font-family:"Bai Jamjuree",sans-serif;font-weight:700;font-size:19px;margin-top:2px}
.stat .v small{font-size:11px;font-weight:400;color:var(--soft)}

.chk{background:var(--card);border:1px solid var(--rule);border-left:3px solid var(--green);
border-radius:0 8px 8px 0;padding:11px 14px;margin-bottom:9px}
.chk.fail{border-left-color:var(--red)}
.chk.warn{border-left-color:var(--gold)}
.chk h4{font-family:"Bai Jamjuree",sans-serif;font-size:13.5px;display:flex;align-items:center;gap:8px}
.chk h4 .mk{font-family:"IBM Plex Mono",monospace;font-size:11px}
.chk.pass h4 .mk{color:var(--green)} .chk.fail h4 .mk{color:var(--red)} .chk.warn h4 .mk{color:#8A6400}
.chk p{font-size:12px;color:var(--soft);margin-top:3px;line-height:1.55}
.chk code{font-family:"IBM Plex Mono",monospace;font-size:11px;background:rgba(22,33,60,.06);padding:1px 5px;border-radius:4px}
.msg{font-size:12.5px;font-weight:600}
.msg.ok{color:var(--green)} .msg.bad{color:var(--red)}
.bar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-top:10px}

.receipt{background:#fff;border:1px solid var(--rule);border-radius:9px;padding:20px;margin-top:16px}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.kv div{border:1px solid var(--rule);border-radius:6px;padding:7px 9px;background:var(--paper)}
.kv .k{font-size:10px;color:var(--soft)} .kv .v{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:500}
tr.tot td{border-top:2px solid var(--ink);border-bottom:0;font-weight:600;padding-top:8px}
.note2{border:1px solid var(--rule);border-radius:6px;padding:9px 11px;background:var(--paper);
font-size:11.5px;color:var(--soft);line-height:1.6;margin-bottom:6px}
.note2 b{color:var(--ink)}
.warnbox{border:1px solid rgba(200,40,30,.35);background:#FFF6F5;border-radius:7px;padding:10px 12px;
margin-top:14px;font-size:11.5px;color:var(--soft);line-height:1.65}
.warnbox b{color:var(--red)}
.receipt table{margin-bottom:2px}
/* ---------- หัวกระดาษราชการ ---------- */
.lethead{text-align:center;padding-bottom:10px;border-bottom:2px solid var(--ink);margin-bottom:4px}
.lethead .mark{display:flex;gap:3px;justify-content:center;align-items:flex-end;margin-bottom:7px}
.lethead .mark i{display:block;width:7px;border-radius:7px 7px 2px 2px}
.lethead .mark i:nth-child(1){height:17px;background:var(--red)}
.lethead .mark i:nth-child(2){height:24px;background:var(--gold)}
.lethead .mark i:nth-child(3){height:20px;background:var(--ink)}
.lethead .org{font-family:"Bai Jamjuree",sans-serif;font-weight:600;font-size:12.5px;line-height:1.4}
.lethead .org small{display:block;font-weight:400;font-size:10.5px;color:var(--soft);margin-top:1px}
.doctitle{font-family:"Bai Jamjuree",sans-serif;font-weight:700;font-size:17px;text-align:center;margin-top:11px}
.docsub{text-align:center;font-size:11.5px;color:var(--soft);margin-top:1px}
.docmeta{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--soft);
border-bottom:1px solid var(--rule);padding:9px 0;margin:10px 0 12px}
.docmeta span b{color:var(--ink);font-family:"IBM Plex Mono",monospace;font-weight:500}
.who{font-family:"Bai Jamjuree",sans-serif;font-size:14.5px;font-weight:600;margin-bottom:9px}
.who .pill{vertical-align:2px}

/* ---------- ตารางในใบเสร็จ ---------- */
.receipt table{margin-bottom:2px;border:1px solid var(--rule)}
.receipt th{background:#F4F1EA;position:static;border-bottom:1px solid var(--ink);
  border-left:1px solid var(--rule);font-size:9.5px;padding:5px 7px;text-align:center;color:var(--ink)}
.receipt th.l{text-align:left}
.receipt td{border-left:1px solid var(--faint);padding:5px 7px}
.receipt tbody tr:nth-child(even) td{background:#FCFBF8}
.receipt tbody tr:hover td{background:#F7F4EC}
.receipt tr.miss td{background:#FFF6F5!important;color:var(--red)}
.receipt tr.newloan td{background:#FDF6E3!important}
.receipt tr.tot td{background:#F4F1EA!important;border-top:1.5px solid var(--ink)}
.ordmark{display:inline-block;width:13px;height:13px;line-height:13px;border-radius:50%;background:var(--ink);
  color:#fff;font-size:8.5px;text-align:center;margin-right:3px;font-family:"IBM Plex Mono",monospace;vertical-align:1px}

/* ---------- ช่องลงลายเซ็น ---------- */
.sigs{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:26px}
.sigbox{text-align:center;font-size:11px;color:var(--ink)}
.sigspace{height:46px}
.sigline{border-top:1px dotted #9aa0b0;padding-top:6px}
.sigrole{color:var(--soft);margin-top:3px;font-size:10.5px}
.sigdate{color:var(--soft);margin-top:5px;font-size:10px}
.legal{margin-top:16px;padding-top:9px;border-top:1px solid var(--rule);font-size:9.5px;color:var(--soft);line-height:1.6}

.note2{border:1px solid var(--rule);border-radius:6px;padding:9px 11px;background:var(--paper);
font-size:11.5px;color:var(--soft);line-height:1.6;margin-bottom:6px}
.note2 b{color:var(--ink)}
.warnbox{border:1px solid rgba(200,40,30,.35);background:#FFF6F5;border-radius:7px;padding:10px 12px;
margin-top:14px;font-size:11.5px;color:var(--soft);line-height:1.65}
.warnbox b{color:var(--red)}


/* ---------- ชุดสัญญา ---------- */
.kpage{background:#fff;border:1px solid var(--rule);border-radius:8px;padding:20px 22px;margin-bottom:14px;
  font-size:11.5px;line-height:1.5}
.khead{text-align:center;border-bottom:1.5px solid var(--ink);padding-bottom:8px;margin-bottom:9px}
.khead .mark{display:flex;gap:3px;justify-content:center;align-items:flex-end;margin-bottom:5px}
.khead .mark i{display:block;width:6px;border-radius:6px 6px 2px 2px}
.khead .mark i:nth-child(1){height:14px;background:var(--red)}
.khead .mark i:nth-child(2){height:20px;background:var(--gold)}
.khead .mark i:nth-child(3){height:17px;background:var(--ink)}
.korg{font-family:"Bai Jamjuree",sans-serif;font-weight:600;font-size:11.5px}
.korg small{display:block;font-weight:400;font-size:10px;color:var(--soft)}
.ktitle{font-family:"Bai Jamjuree",sans-serif;font-weight:700;font-size:15px;margin-top:6px}
.kmeta{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:10.5px;color:var(--soft);
  border-bottom:1px solid var(--rule);padding-bottom:6px;margin-bottom:8px}
.ksec{font-family:"Bai Jamjuree",sans-serif;font-weight:600;font-size:11.5px;background:#F4F1EA;
  border-left:3px solid var(--ink);padding:3px 8px;margin:11px 0 6px}
.ksec2{font-family:"Bai Jamjuree",sans-serif;font-weight:600;font-size:11px;color:var(--soft);margin:9px 0 4px}
.kf{display:flex;flex-wrap:wrap;gap:6px 18px;margin:4px 0}
.dot{display:inline-block;border-bottom:1px dotted #8b93a6;height:13px}
.fill{font-family:"IBM Plex Sans Thai",sans-serif;border-bottom:1px solid var(--ink);padding:0 4px}
.fill.big{font-size:14px}
.kt{width:100%;border-collapse:collapse;font-size:11px;margin:4px 0}
.kt td,.kt th{border:1px solid var(--rule);padding:4px 7px;text-align:left}
.kt th{background:#F4F1EA;font-size:10px;font-weight:600}
.kt .kk{width:130px;background:#FBF9F4;color:var(--soft);font-size:10.5px}
.kt .n{text-align:right;font-family:"IBM Plex Mono",monospace}
.kt .c{text-align:center;font-family:"IBM Plex Mono",monospace}
.kt2 td{width:25%}
.kt3 tr.hl td{background:#FDF6E3}
.kh{font-size:10px;color:var(--soft)}
.keybox{border:1px solid var(--rule);border-radius:5px;padding:7px 10px;background:#FBF9F4;margin:7px 0;font-size:10.5px}
.keybox ol{margin:4px 0 0 16px} .keybox li{margin-bottom:1px}
.ack{border:1px solid var(--ink);border-radius:5px;padding:8px 10px;margin:8px 0;font-size:10.5px}
.ack div{margin-bottom:3px}
.ack p{margin-top:5px;color:var(--soft)}
.capbox{border:1.5px solid var(--red);border-radius:5px;padding:6px 10px;margin:6px 0;font-size:11.5px}
.ksigs{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:14px;text-align:center;font-size:10.5px}
.ksig .sp{height:38px} .ksig .ln{border-top:1px dotted #8b93a6;padding-top:4px}
.ksig .rl{color:var(--soft);font-size:10px;margin-top:2px}
.kcut{border-top:1px dashed var(--rule);margin:14px 0}
.ksch{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ktsch td,.ktsch th{padding:1.5px 4px;font-size:9px}
.ktot{border-top:1.5px solid var(--ink);margin-top:6px;padding-top:5px;text-align:right;font-size:11px}
@media print{
  body.kprint .kpage{page-break-after:always;border:0;border-radius:0;padding:0;margin:0}
  body.kprint .kpage:last-child{page-break-after:auto}
  body.kprint section:not(#tab5){display:none!important}
  body.kprint #tab5>.card{display:none!important}
  .kpage{width:auto!important;min-height:auto!important;margin:0!important;padding:0!important;
    box-shadow:none!important;border:0!important}
  body.wprint section:not(#tab7){display:none!important}
  body.wprint #tab7>.card,body.wprint #tab7>.stats{display:none!important}
  body.wprint .kpage,body.aprint .kpage{page-break-after:always}
  body.aprint section:not(#tab6){display:none!important}
  body.aprint #tab6>.card,body.aprint #tab6>.stats,body.aprint #tab6 .tbl{display:none!important}
  body.aprint #a_doc>.eyebrow{display:none!important}
  .kpage,.ksigs,.ack,.keybox,.capbox{page-break-inside:avoid}
}


/* ---------- เอกสารข้อความครบ ---------- */
.kpage{position:relative;padding:22px 24px 34px}
.pgno{position:absolute;top:12px;right:22px;font-size:10px;color:var(--soft)}
.pgsig{position:absolute;bottom:12px;right:24px;font-size:10px;color:var(--soft)}
.klogo{text-align:center;margin-bottom:4px}
.klogo .mark{display:inline-flex;gap:3px;align-items:flex-end}
.klogo .mark i{display:block;width:6px;border-radius:6px 6px 2px 2px}
.klogo .mark i:nth-child(1){height:13px;background:var(--red)}
.klogo .mark i:nth-child(2){height:19px;background:var(--gold)}
.klogo .mark i:nth-child(3){height:16px;background:var(--ink)}
.klogo .wm{display:block;font-family:"Bai Jamjuree",sans-serif;font-weight:700;font-size:15px;
  color:#2A4CC8;letter-spacing:.06em;margin-top:2px}
.kt1{text-align:center;font-family:"Bai Jamjuree",sans-serif;font-weight:700;font-size:14px;margin-top:5px;line-height:1.35}
.kt2{text-align:center;font-size:11px;color:var(--soft);margin-top:2px;line-height:1.4}
.stars{text-align:center;font-size:10px;color:var(--soft);letter-spacing:1px}
.rt{text-align:right;font-size:11px;margin-top:3px}
.kpage p{margin:5px 0;text-align:justify;text-justify:inter-word}
.kpage .i{margin-left:16px} .kpage .i2{margin-left:16px;color:#2b3550}
.kpage .star{font-style:italic}
.kpage .h{font-family:"Bai Jamjuree",sans-serif;font-weight:600;font-size:12px;margin:9px 0 4px}
.kpage .sub{font-size:10.5px;color:var(--soft);text-align:right;margin:-2px 0 6px}
.kpage .ul{margin:3px 0 5px 32px} .kpage .ul li{margin-bottom:1px}
.pt{border:1px solid var(--rule);border-radius:5px;padding:6px 9px;margin:5px 0;background:#FCFBF8;line-height:1.7}
.dt{display:inline-block;border-bottom:1px dotted #8b93a6;height:12px;vertical-align:-2px}
.f{border-bottom:1px solid var(--ink);padding:0 4px;font-weight:600}
.f.mono{font-family:"IBM Plex Mono",monospace;letter-spacing:.4px}
.f.big{font-size:14px}
.calcbox{border:1px solid var(--ink);border-radius:5px;padding:7px 9px;margin:6px 0;background:#FBF9F4}
.benbox{border:1px solid var(--rule);border-radius:5px;padding:7px 9px;margin:5px 0 5px 16px;line-height:2}
.dtl{border:1px solid var(--rule);border-radius:5px;padding:6px 9px;margin:6px 0;background:#FCFBF8}
.kt.sum td{width:auto} .kt.sum tr.hl td{background:#FDF6E3}
.kt.sg td{height:24px} .kt.sg tr.hl td{background:#FDF6E3}
.kt .c{text-align:center}
.hr{border:0;border-top:1px dashed var(--rule);margin:10px 0}
.kmeta2{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:10.5px;color:var(--soft);
  border-bottom:1px solid var(--rule);padding:6px 0;margin-bottom:6px}
.csig{margin-top:20px;margin-left:60px;font-size:11px;line-height:2}
.csig .rl{margin-left:60px;color:var(--soft);font-size:10px;line-height:1.2}


/* ---------- กระดาษ A4 ---------- */
.kpage{width:210mm;min-height:297mm;margin:0 auto 14px;padding:15mm 14mm 18mm;
  box-shadow:0 2px 10px rgba(22,33,60,.09);border:1px solid var(--rule);border-radius:0;background:#fff}
#kdoc,#wdoc,#a_doc{overflow-x:auto}
.warnbox2{border:1px solid var(--rule);border-left:3px solid var(--red);border-radius:0 5px 5px 0;
  padding:7px 10px;margin:8px 0;background:#FFFAF9;font-size:10.5px}
.ackbox{border:1px dashed var(--rule);border-radius:5px;padding:7px 10px;margin-top:12px;font-size:10.5px;background:#FBF9F4}
@media(max-width:960px){.kpage{width:100%;min-height:auto;padding:14px}}


/* จัดหน้าให้เต็ม ลดพื้นที่ว่าง */
.kpage{font-size:11.8px;line-height:1.52}
.kpage p{margin:4px 0}
.kpage .h{margin:8px 0 3px}
.kpage .ksec{margin:9px 0 5px}
.pt{padding:5px 8px;margin:4px 0;line-height:1.6}
.kt td,.kt th{padding:3px 6px}
.keybox,.ack,.dtl,.calcbox{padding:6px 9px;margin:6px 0}
.ksigs{margin-top:11px}
.ksig .sp{height:34px}
.kpage .ul{margin:2px 0 4px 30px}

/* ---------- การพิมพ์ ---------- */
@page{size:A4 portrait;margin:15mm 14mm 18mm}
@media print{
  html,body{background:#fff!important;padding:0;margin:0;font-size:11px;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .mast,nav,.tools,.noprint,.card,.stats{display:none!important}
  .eyebrow{display:none}
  .receipt .eyebrow{display:flex!important;margin:14px 0 6px;color:var(--ink);font-weight:600}
  /* โหมดปกติ = ใบเสร็จ (แท็บ 3) */
  body.rprint section:not(#tab3){display:none!important}
  body.rprint #slipHead,body.rprint #tblSec{display:none!important}
  body.rprint .receipt{border:0!important;border-radius:0;padding:0;margin:0;box-shadow:none}
  body.rprint.bulk .receipt{page-break-after:always}
  body.rprint.bulk .receipt:last-child{page-break-after:auto}

<script type="text/plain" id="gs_src">/*******************************************************************
 *  กบข.นข. — ระบบทะเบียนสัญญาและรับชำระ  (Google Apps Script)
 *  กลุ่มบุคคลเพื่อบริหารจัดการเงินของข้าราชการครูและบุคลากร
 *  โรงเรียนมัธยมวัดหนองแขม · บัญชี 206-2-63177-8
 *
 *  วิธีติดตั้ง
 *   1. เปิด Google Sheets ใหม่ → ส่วนขยาย → Apps Script
 *   2. ลบโค้ดเดิมทิ้ง แล้ววางไฟล์นี้ทั้งหมด → บันทึก
 *   3. รีโหลดหน้า Sheet → เมนู "กบข.นข." จะขึ้นมา
 *   4. กด  กบข.นข. → 1) สร้างชีททั้งหมด
 *   5. กด  กบข.นข. → 2) นำเข้าข้อมูลจาก JSON  แล้ววาง JSON ที่ส่งออกจากโปรแกรม
 *   6. กด  กบข.นข. → 4) คำนวณใหม่ทั้งระบบ
 *******************************************************************/

var RATE = 0.01;        // ดอกเบี้ย 1.00%/เดือน (สัญญาข้อ 2.5)
var CUT = 20;           // โอนตั้งแต่วันที่นี้ = งวดของเดือนถัดไป
var GUAR_MAX = 3;       // ค้ำได้ไม่เกิน 3 สัญญาพร้อมกัน
var FEE_PCT = 0.05, FEE_MAX = 100, GRACE = 5;   // ค่าทวงถาม (ข้อ 3.1)
var DK_QUOTA = 150000, DK_SLOTS = 10;           // เพดานโครงการดูแลกัน

var HEAD = {
  'สมาชิก':     ['เลขสมาชิก','ชื่อ-สกุล','เลขบัตรประชาชน','ตำแหน่ง','โทร','ที่อยู่','หุ้นยกมา','สถานะพิเศษ'],
  'บัญชีธนาคาร': ['บัญชีท้าย4','ชื่อในสเตทเมนท์','เลขสมาชิก'],
  'สัญญา':      ['เลขทะเบียนสัญญา','รหัสสัญญา','ผลิตภัณฑ์','เลขสมาชิก','วันที่ทำสัญญา','วงเงิน','งวด',
                 'งวดละ','หุ้นประจำ','วิธีคิดหุ้น','ผู้ค้ำ1','ผู้ค้ำ2','วงเงินรับผิดผู้ค้ำ','ยอดยกมา','สัญญาเก่า'],
  'รับชำระ':    ['วันที่','เวลา','บัญชีท้าย4','ยอดเงิน','เลขสมาชิก','รหัสสัญญา','งวด'],
  'รายงวด':     ['รหัสสัญญา','เลขทะเบียนสัญญา','เลขสมาชิก','ชื่อ','ผลิตภัณฑ์','งวด','ต้องชำระ','รับชำระ',
                 'ขาด','ดอกเบี้ย','ฝากหุ้น','เงินต้น','คงเหลือ','ค่าทวงถาม','สถานะงวด','ผ่อนผัน','เลขที่มติ'],
  'สรุปรายคน':  ['เลขสมาชิก','ชื่อ','สถานะ','ทุนเรือนหุ้น','หนี้คงเหลือ','รับเข้ารวม','ค่าทวงถามค้าง',
                 'จำนวนสัญญา','ค้ำอยู่(สัญญา)','ถอนทุนได้'],
  'วางสเตทเมนท์':['วางข้อความจากหน้าบุ๊คแบงค์ที่นี่ (คอลัมน์ A) แล้วสั่ง เมนู → 3) อ่านสเตทเมนท์']
};

/* ---------------- เมนู ---------------- */
function onOpen() {
  SpreadsheetApp.getUi().createMenu('กบข.นข.')
    .addItem('1) สร้างชีททั้งหมด', 'setupSheets')
    .addItem('2) นำเข้าข้อมูลจาก JSON', 'importJson')
    .addItem('3) อ่านสเตทเมนท์ที่วางไว้', 'parseStatement')
    .addItem('4) คำนวณใหม่ทั้งระบบ', 'recalcAll')
    .addSeparator()
    .addItem('ตรวจสอบความถูกต้อง', 'runChecks')
    .addToUi();
}

function sh(name) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  return ss.getSheetByName(name) || ss.insertSheet(name);
}

function setupSheets() {
  Object.keys(HEAD).forEach(function (name) {
    var s = sh(name);
    s.clear();
    s.getRange(1, 1, 1, HEAD[name].length).setValues([HEAD[name]])
      .setFontWeight('bold').setBackground('#16213C').setFontColor('#ffffff');
    s.setFrozenRows(1);
    s.autoResizeColumns(1, HEAD[name].length);
  });
  SpreadsheetApp.getUi().alert('สร้างชีทครบ ' + Object.keys(HEAD).length + ' ชีทแล้ว\n\nขั้นต่อไป: เมนู → 2) นำเข้าข้อมูลจาก JSON');
}

/* ---------------- นำเข้าจาก JSON ที่ส่งออกจากโปรแกรม ---------------- */
function importJson() {
  var ui = SpreadsheetApp.getUi();
  var res = ui.prompt('นำเข้าข้อมูล', 'วาง JSON ที่ส่งออกจากโปรแกรม (ปุ่ม "ส่งออก JSON")', ui.ButtonSet.OK_CANCEL);
  if (res.getSelectedButton() !== ui.Button.OK) return;
  var D;
  try { D = JSON.parse(res.getResponseText()); }
  catch (e) { ui.alert('JSON ไม่ถูกต้อง: ' + e); return; }

  if (D.members) {
    var rows = D.members.map(function (m) {
      var p = (D.profile && D.profile[m.no]) || {};
      return [m.no, m.name, p.cid || '', p.pos || '', p.tel || '', p.addr || '', m.share || 0, p.wd || ''];
    });
    writeRows('สมาชิก', rows);
  }
  if (D.acct) {
    var ar = Object.keys(D.acct).map(function (a) {
      return [a, (D.anames && D.anames[a]) || '', D.acct[a]];
    });
    writeRows('บัญชีธนาคาร', ar);
  }
  if (D.contracts) {
    writeRows('สัญญา', D.contracts.map(function (c) {
      return [c.code || '', c.id, c.prod, c.no, c.d || '', c.amt || 0, c.terms || 0, c.inst || 0,
              c.shareM || 0, c.mode || 'fixed', c.g1 || '', c.g2 || '', c.cap || 0, c.open || 0, c.legacy ? 'ใช่' : ''];
    }));
  }
  if (D.tx) {
    writeRows('รับชำระ', D.tx.map(function (t) {
      return [t.d, t.t || '', t.a, t.m, '', '', ''];
    }));
  }
  recalcAll();
  ui.alert('นำเข้าเรียบร้อย และคำนวณใหม่ให้แล้ว');
}

function writeRows(name, rows) {
  var s = sh(name), n = HEAD[name].length;
  if (s.getLastRow() > 1) s.getRange(2, 1, s.getLastRow() - 1, n).clearContent();
  if (!rows.length) return;
  s.getRange(2, 1, rows.length, n).setValues(rows);
}

function readTable(name) {
  var s = sh(name), last = s.getLastRow();
  if (last < 2) return [];
  var head = HEAD[name];
  var vals = s.getRange(2, 1, last - 1, head.length).getValues();
  return vals.filter(function (r) { return String(r[0]).trim() !== ''; })
    .map(function (r) { var o = {}; head.forEach(function (h, i) { o[h] = r[i]; }); return o; });
}

/* ---------------- เครื่องคำนวณ (ตรงกับโปรแกรม) ---------------- */
function extraRate(t) {
  if (t <= 12) return 0.08; if (t <= 24) return 0.10; if (t <= 36) return 0.12;
  if (t <= 48) return 0.14; if (t <= 60) return 0.16; return 0.18;
}
// วงเงินกู้สูงสุด = Σ (M − B − E_t) / (1+i)^t
function maxPrincipal(M, B, N, i) {
  var P = 0;
  for (var t = 1; t <= N; t++) P += (M - B - M * extraRate(t)) / Math.pow(1 + i, t);
  return r2(P);
}
function r2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
function d2(v) { return (v instanceof Date) ? Utilities.formatDate(v, 'Asia/Bangkok', 'yyyy-MM-dd') : String(v); }

function periodOf(dateStr) {
  var p = d2(dateStr).split('-'), y = +p[0], m = +p[1], d = +p[2];
  if (d >= CUT) { m++; if (m > 12) { m = 1; y++; } }
  return (y + 543) + '-' + ('0' + m).slice(-2);
}
function periodList(fromP, n) {
  var p = fromP.split('-'), y = +p[0], m = +p[1], out = [];
  for (var k = 0; k < n; k++) { out.push(y + '-' + ('0' + m).slice(-2)); m++; if (m > 12) { m = 1; y++; } }
  return out;
}
function shareAt(c, t) {
  return c['วิธีคิดหุ้น'] === 'calc'
    ? r2((+c['หุ้นประจำ'] || 0) + (+c['งวดละ'] || 0) * extraRate(t))
    : (+c['หุ้นประจำ'] || 0);
}
function kindOf(got, int, due) {
  if (got <= 0.005) return 'ไม่ชำระ';
  if (got < int - 0.005) return 'ไม่พอดอกเบี้ย';
  if (got < due - 0.005) return Math.abs(got - int) <= 50 ? 'ชำระเฉพาะดอกเบี้ย' : 'ชำระบางส่วน';
  return got > due + 0.005 ? 'ชำระเกิน' : 'ชำระครบ';
}

/* ---------------- จับคู่เงินเข้า → สัญญา ---------------- */
function assignPayments(members, accts, contracts, pays) {
  var byAcct = {}; accts.forEach(function (a) { byAcct[String(a['บัญชีท้าย4'])] = String(a['เลขสมาชิก']); });
  pays.forEach(function (t) {
    var no = byAcct[String(t['บัญชีท้าย4'])] || '';
    t._no = no; t._p = periodOf(t['วันที่']); t._cid = '';
    if (!no) return;
    var cs = contracts.filter(function (c) { return String(c['เลขสมาชิก']) === no; });
    if (!cs.length) { t._cid = 'หุ้น'; return; }
    var hit = cs.filter(function (c) { return +c['งวดละ'] > 0 && Math.abs(+t['ยอดเงิน'] - +c['งวดละ']) <= 2; });
    if (hit.length === 1) { t._cid = hit[0]['รหัสสัญญา']; return; }
    if (cs.length === 1) { t._cid = (+t['ยอดเงิน'] < 600 && !hit.length) ? 'หุ้น' : cs[0]['รหัสสัญญา']; return; }
    t._cid = '';   // แยกไม่ออก — ต้องระบุเอง
  });
  return pays;
}

/* ---------------- คำนวณรายสัญญา ---------------- */
function runContract(c, pays, periods) {
  var recv = {}, txp = {};
  pays.forEach(function (t) {
    if (t._cid !== c['รหัสสัญญา']) return;
    recv[t._p] = (recv[t._p] || 0) + (+t['ยอดเงิน']);
    (txp[t._p] = txp[t._p] || []).push(t);
  });
  var legacy = String(c['สัญญาเก่า']) === 'ใช่';
  var start = legacy ? periods[0] : periodOf(c['วันที่ทำสัญญา']);
  var flat = c['ผลิตภัณฑ์'] === 'ดูแลกัน' ? r2((+c['วงเงิน'] || 0) * RATE) : null;
  var bal = legacy ? (+c['ยอดยกมา'] || 0) : 0;
  var rows = [], missed = 0;

  periods.forEach(function (p) {
    var got = r2(recv[p] || 0);
    if (!legacy && p < start) return;
    var nl = (!legacy && p === start) ? (+c['วงเงิน'] || 0) : 0;
    if (bal <= 0.005 && !nl) return;
    if (nl) bal = r2(bal + nl);

    var tn = legacy ? 0 : periods.indexOf(p) - periods.indexOf(start) + 1;
    var shDue = legacy ? (+c['หุ้นประจำ'] || 0) : shareAt(c, Math.max(1, tn));
    var int = (flat !== null) ? flat : r2(bal * RATE);
    var due = r2(+c['งวดละ'] || 0) || r2(int + shDue);
    var short = r2(Math.max(0, due - got));
    var kind = kindOf(got, int, due);
    var late = (txp[p] || []).some(function (t) {
      var pp = p.split('-'); var cut = new Date(+pp[0] - 543, +pp[1] - 1, 5 + GRACE);
      return new Date(d2(t['วันที่'])) > cut;
    });
    var fee = (short > 0.005 || late) && due > 0 ? r2(Math.min(due * FEE_PCT, FEE_MAX)) : 0;

    // จัดสรรตามข้อ 2.2 : ดอกเบี้ย → หุ้น → เงินต้น
    var rest = got;
    var gInt = Math.min(rest, int); rest -= gInt;
    var sh = Math.max(0, Math.min(rest, shDue)); rest -= sh;
    var pri = r2(rest); if (pri > bal) pri = r2(bal);
    bal = r2(bal - pri);

    if (short > 0.005) missed++; else missed = 0;   // ข้อ 2.3
    rows.push({ p: p, due: due, got: got, short: short, int: r2(gInt), sh: sh, pri: pri,
                bal: bal, fee: fee, kind: kind });
  });
  return { rows: rows, bal: bal, missed: missed };
}

/* ---------------- คำนวณใหม่ทั้งระบบ ---------------- */
function recalcAll() {
  var members = readTable('สมาชิก'), accts = readTable('บัญชีธนาคาร'),
      contracts = readTable('สัญญา'), pays = readTable('รับชำระ');
  if (!contracts.length) { SpreadsheetApp.getUi().alert('ยังไม่มีข้อมูลในชีท "สัญญา"'); return; }

  var periods = periodList('2569-01', 12);
  assignPayments(members, accts, contracts, pays);

  // เขียนผลจับคู่กลับลงชีทรับชำระ
  var ps = sh('รับชำระ');
  if (pays.length) ps.getRange(2, 5, pays.length, 3).setValues(pays.map(function (t) {
    return [t._no, t._cid, t._p];
  }));

  var per = [], sum = {}, guar = {};
  members.forEach(function (m) {
    sum[m['เลขสมาชิก']] = { shares: +m['หุ้นยกมา'] || 0, bal: 0, got: 0, fee: 0, n: 0 };
  });
  pays.forEach(function (t) {
    if (t._cid === 'หุ้น' && sum[t._no]) sum[t._no].shares += +t['ยอดเงิน'];
    if (t._no && sum[t._no]) sum[t._no].got += +t['ยอดเงิน'];
  });

  contracts.forEach(function (c) {
    var m = members.filter(function (x) { return String(x['เลขสมาชิก']) === String(c['เลขสมาชิก']); })[0] || {};
    var r = runContract(c, pays, periods);
    r.rows.forEach(function (w) {
      per.push([c['รหัสสัญญา'], c['เลขทะเบียนสัญญา'], c['เลขสมาชิก'], m['ชื่อ-สกุล'] || '', c['ผลิตภัณฑ์'],
                w.p, w.due, w.got, w.short, w.int, w.sh, w.pri, w.bal, w.fee, w.kind, '', '']);
    });
    var s = sum[c['เลขสมาชิก']];
    if (s) { s.bal += r.bal; s.fee += r.rows.reduce(function (a, w) { return a + w.fee; }, 0);
             s.shares += r.rows.reduce(function (a, w) { return a + w.sh; }, 0); s.n++; }
    if (r.bal > 0.005) {
      [c['ผู้ค้ำ1'], c['ผู้ค้ำ2']].forEach(function (g) { if (g) guar[g] = (guar[g] || 0) + 1; });
    }
  });
  writeRows('รายงวด', per);

  writeRows('สรุปรายคน', members.map(function (m) {
    var s = sum[m['เลขสมาชิก']] || { shares: 0, bal: 0, got: 0, fee: 0, n: 0 };
    var g = guar[m['เลขสมาชิก']] || 0;
    var st = m['สถานะพิเศษ'] || (s.n === 0 ? 'ผู้ฝาก' : (s.bal <= 0.005 ? 'ปิดหนี้แล้ว' : 'ผู้กู้'));
    return [m['เลขสมาชิก'], m['ชื่อ-สกุล'], st, r2(s.shares), r2(s.bal), r2(s.got), r2(s.fee),
            s.n, g, (s.bal <= 0.005 && g === 0) ? 'ถอนทุนได้' : 'ยังถอนไม่ได้'];
  }));

  fmt();
  SpreadsheetApp.getActiveSpreadsheet().toast('คำนวณใหม่เรียบร้อย · ' + per.length + ' แถวรายงวด', 'กบข.นข.', 5);
}

function fmt() {
  ['รายงวด', 'สรุปรายคน', 'สัญญา', 'รับชำระ'].forEach(function (n) {
    var s = sh(n); if (s.getLastRow() < 2) return;
    s.getRange(2, 1, s.getLastRow() - 1, s.getLastColumn()).setFontFamily('Sarabun');
  });
  var p = sh('รายงวด');
  if (p.getLastRow() > 1) {
    p.getRange(2, 7, p.getLastRow() - 1, 8).setNumberFormat('#,##0.00');
    var rng = p.getRange(2, 1, p.getLastRow() - 1, p.getLastColumn());
    rng.clearFormat();
    var rules = [
      SpreadsheetApp.newConditionalFormatRule().whenFormulaSatisfied('=$O2="ไม่ชำระ"')
        .setBackground('#FDE7E5').setRanges([rng]).build(),
      SpreadsheetApp.newConditionalFormatRule().whenFormulaSatisfied('=OR($O2="ชำระเฉพาะดอกเบี้ย",$O2="ชำระบางส่วน")')
        .setBackground('#FDF6E3').setRanges([rng]).build(),
      SpreadsheetApp.newConditionalFormatRule().whenFormulaSatisfied('=$O2="ชำระครบ"')
        .setBackground('#EAF5EF').setRanges([rng]).build()
    ];
    p.setConditionalFormatRules(rules);
  }
}

/* ---------------- อ่านสเตทเมนท์ที่วางไว้ ---------------- */
function parseStatement() {
  var s = sh('วางสเตทเมนท์'), last = s.getLastRow();
  if (last < 2) { SpreadsheetApp.getUi().alert('ยังไม่มีข้อความในชีท "วางสเตทเมนท์"'); return; }
  var lines = s.getRange(2, 1, last - 1, 1).getValues().map(function (r) { return String(r[0]); });
  var ps = sh('รับชำระ');
  var have = {};
  readTable('รับชำระ').forEach(function (t) {
    have[d2(t['วันที่']) + '|' + t['เวลา'] + '|' + t['บัญชีท้าย4'] + '|' + t['ยอดเงิน']] = 1;
  });
  var add = [], dup = 0;
  lines.forEach(function (ln) {
    if (!/รับโอน|โอนเข้า/.test(ln)) return;
    var d = ln.match(/(\d{2})-(\d{2})-(\d{2})/), t = ln.match(/(\d{2}:\d{2})/), a = ln.match(/(X\d{4})/);
    if (!d || !t || !a) return;
    var nums = ln.match(/\d{1,3}(?:,\d{3})*\.\d{2}/g);
    if (!nums) return;
    var date = '20' + d[3] + '-' + d[2] + '-' + d[1], amt = parseFloat(nums[0].replace(/,/g, ''));
    var k = date + '|' + t[1] + '|' + a[1] + '|' + amt;
    if (have[k]) { dup++; return; }
    have[k] = 1;
    add.push([date, t[1], a[1], amt, '', '', '']);
  });
  if (add.length) ps.getRange(ps.getLastRow() + 1, 1, add.length, 7).setValues(add);
  SpreadsheetApp.getUi().alert('เพิ่ม ' + add.length + ' รายการ · ซ้ำ ' + dup + ' รายการ\n\nกด "4) คำนวณใหม่ทั้งระบบ" ต่อ');
}

/* ---------------- ตรวจสอบ ---------------- */
function runChecks() {
  var members = readTable('สมาชิก'), accts = readTable('บัญชีธนาคาร'),
      contracts = readTable('สัญญา'), pays = readTable('รับชำระ');
  var out = [];

  var known = {}; accts.forEach(function (a) { if (a['เลขสมาชิก']) known[String(a['บัญชีท้าย4'])] = 1; });
  var unk = {}; pays.forEach(function (t) { if (!known[String(t['บัญชีท้าย4'])]) unk[t['บัญชีท้าย4']] = 1; });
  out.push(chk(!Object.keys(unk).length, 'บัญชีผู้โอนจับคู่ครบ', Object.keys(unk).join(', ')));

  var bad = contracts.filter(function (c) { return !c['วงเงิน'] || !c['งวด'] || !c['งวดละ']; });
  out.push(chk(!bad.length, 'สัญญากรอกข้อมูลครบ', bad.length + ' ฉบับยังขาด วงเงิน/งวด/งวดละ'));

  var nocode = contracts.filter(function (c) { return !c['เลขทะเบียนสัญญา']; });
  out.push(chk(!nocode.length, 'สัญญามีเลขทะเบียนครบ', nocode.length + ' ฉบับยังไม่มีเลข'));

  var seen = {}, dup = [];
  contracts.forEach(function (c) { var k = c['เลขทะเบียนสัญญา'];
    if (!k) return; if (seen[k]) dup.push(k); seen[k] = 1; });
  out.push(chk(!dup.length, 'ไม่มีเลขทะเบียนซ้ำ', dup.join(', ')));

  var g = {};
  contracts.forEach(function (c) {
    [c['ผู้ค้ำ1'], c['ผู้ค้ำ2']].forEach(function (x) { if (x) g[x] = (g[x] || 0) + 1; });
  });
  var over = Object.keys(g).filter(function (k) { return g[k] > GUAR_MAX; });
  out.push(chk(!over.length, 'ไม่มีใครค้ำเกิน ' + GUAR_MAX + ' สัญญา',
    over.map(function (k) { return k + ' ค้ำ ' + g[k] + ' สัญญา'; }).join(', ')));

  var dk = contracts.filter(function (c) { return c['ผลิตภัณฑ์'] === 'ดูแลกัน'; });
  var dkAmt = dk.reduce(function (a, c) { return a + (+c['วงเงิน'] || 0); }, 0);
  out.push(chk(dkAmt <= DK_QUOTA && dk.length <= DK_SLOTS, 'โครงการดูแลกันไม่เกินเพดาน',
    'ใช้ไป ' + dkAmt + ' / ' + DK_QUOTA + ' · ' + dk.length + ' / ' + DK_SLOTS + ' สิทธิ์'));

  var vio = [];
  contracts.forEach(function (c) {
    if (c['ผลิตภัณฑ์'] === 'ดูแลกัน') {
      if (+c['วงเงิน'] > 35000) vio.push(c['เลขทะเบียนสัญญา'] + ' วงเงินเกิน 35,000');
      if (+c['งวด'] > 36) vio.push(c['เลขทะเบียนสัญญา'] + ' เกิน 36 งวด');
      if (!c['ผู้ค้ำ1']) vio.push(c['เลขทะเบียนสัญญา'] + ' ไม่มีผู้ค้ำ');
    } else if (!String(c['สัญญาเก่า'])) {
      if (!c['ผู้ค้ำ1'] || !c['ผู้ค้ำ2']) vio.push(c['เลขทะเบียนสัญญา'] + ' ต้องมีผู้ค้ำ 2 คน');
    }
  });
  out.push(chk(!vio.length, 'ทุกสัญญาอยู่ในกรอบระเบียบ', vio.join(' · ')));

  SpreadsheetApp.getUi().alert('ผลการตรวจสอบ\n\n' + out.join('\n'));
}
function chk(ok, t, d) { return (ok ? '✓ ' : '✗ ') + t + (ok ? '' : '\n     → ' + d); }
</script>
</div>

<script>
let DB = null;

  "ดูแลกัน": {method:"flat",   maxAmt:35000, maxTerms:36, guar:1, quota:150000, slots:10,
              note:"Flat · ดอกเบี้ยคงที่ทุกงวด = วงเงิน × 1% (สัญญาข้อ 2.3)"},
};

const B0 = n => (+n||0).toLocaleString("th-TH",{maximumFractionDigits:0});

/* ============ สถานะ ============ */

          acct: {...DB.acct}, assign: {}, cut: 20, profile: {}, pick: null, per: {}, watch: null, rule: {}, fprod: "", fper: "" }; }

/* ============ บันทึกขึ้น Google Sheets ============ */

function pack(){ return {members:DB.members, anames:DB.anames, wd:DB.wd,

  profile:S.profile, per:S.per, rule:S.rule, cut:S.cut}; }
async function doSave(){
  if(_saving){ _again = true; return; }

  try{
    await gas("saveState", JSON.stringify(pack()));

  }catch(e){ setStatus("⚠ บันทึกไม่สำเร็จ: " + (e.message||e) + " — กด «ส่งออก JSON» สำรองไว้ก่อน"); }
  _saving = false;
  if(_again){ _again = false; save(); }
}

/* ============ งวด ============ */
function periodOf(d){
  let [y,m,dd] = d.split("-").map(Number);
  if (dd >= S.cut){ m++; if(m>12){m=1;y++;} }
  return `${y+543}-${String(m).padStart(2,"0")}`;
}


/* ============ สถานะการชำระรายงวด + ค่าทวงถาม + การผ่อนผัน ============ */
const FEE_PCT = 0.05, FEE_MAX = 100, GRACE = 5;   // ข้อ 3.1
const perKey = (cid,p) => cid+"|"+p;
function per(cid,p){ S.per = S.per||{}; return S.per[perKey(cid,p)] || {}; }
function setPer(cid,p,f,v){ S.per = S.per||{}; const k=perKey(cid,p);
  S.per[k] = Object.assign({}, S.per[k], {[f]:v}); }

// งวดนี้จ่ายช้าหรือไม่ — กำหนดชำระวันที่ 5 ของเดือนงวด + ผ่อนผัน 5 วัน
function lateOf(c,p,txs){
  const [py,pm] = p.split("-").map(Number);
  const cut = new Date(py-543, pm-1, 5+GRACE);
  return txs.some(t => new Date(t.d) > cut);
}
function feeOf(c,p,got,due,txs){
  const m = per(c.id,p);
  if(m.fee!=null) return +m.fee;                      // แก้ด้วยมือ / ยกเว้น
  if(m.relief) return 0;
  const late = (got<due-0.005) || lateOf(c,p,txs);
  return late && due>0 ? +Math.min(due*FEE_PCT, FEE_MAX).toFixed(2) : 0;
}
function kindOf(got,int,due){
  if(got<=0.005) return "ไม่ชำระ";
  if(got < int-0.005) return "ไม่พอดอกเบี้ย";
  if(got < due-0.005) return Math.abs(got-int)<=50 ? "ชำระเฉพาะดอกเบี้ย" : "ชำระบางส่วน";
  return got > due+0.005 ? "ชำระเกิน" : "ชำระครบ";
}
const KIND_CLS = {"ชำระครบ":"grn","ชำระเกิน":"grn","ชำระเฉพาะดอกเบี้ย":"yel","ชำระบางส่วน":"yel",
                  "ไม่พอดอกเบี้ย":"red","ไม่ชำระ":"red","รับชำระแล้ว":"","ไม่มีเงินเข้า":""};

/* ============ แท็บ 7 — ติดตามหนี้ & หนังสือเตือน ============ */
function drawT7(){

  const cur = S.contracts.find(x=>x.id===S.watch && runContract(x).assessed) || (bad[0]&&bad[0].c) || (OK[0]&&OK[0].c);
  if(cur) S.watch = cur.id;

  const opts = R.filter(x=>x.r.assessed).map(({c,r})=>{const m=DB.members.find(z=>z.no===c.no);

        return `<tr><td class="l">${PLBL[w.p]}${w.opens?' <span class="pill yel">รับเงินกู้</span>':""}</td>

      }).join("")}

  } else body = `<p class="hint">${R.length?"ยังไม่มีสัญญาที่กรอก «งวดละ» ครบ จึงยังประเมินการชำระไม่ได้":"ยังไม่มีสัญญาที่มีหนี้คงเหลือ"}</p>`;

  $("tab7").innerHTML = `
  ${NA.length?`<div class="card" style="border-left:3px solid var(--gold)">
    <div class="eyebrow">ยังออกหนังสือเตือนไม่ได้ ${NA.length} สัญญา</div>
    <p class="hint" style="margin:0"><b>สัญญาเหล่านี้ยังไม่ได้กรอก «งวดละ» ในทะเบียน (แท็บ 1)</b> —
      ระบบจึงไม่ทราบว่าแต่ละงวดต้องชำระเท่าไหร่ และ<b>จะไม่เดาให้</b> เพราะการเดาแล้วส่งหนังสือเตือนผิดคน
      เสียหายมากกว่าการรอ · เมื่อกรอกครบ สัญญาจะโผล่ในรายการด้านล่างเอง<br>
      ค้างอยู่: ${NA.slice(0,8).map(x=>{const m=DB.members.find(z=>z.no===x.c.no);return esc(m?m.name:x.c.no);}).join(" · ")}${NA.length>8?` และอีก ${NA.length-8} ราย`:""}</p>
  </div>`:""}
  <div class="stats">
    <div class="stat"><div class="k">สัญญาที่มีหนี้</div><div class="v">${R.length}</div></div>
    <div class="stat"><div class="k">สัญญาที่มีปัญหาชำระ</div><div class="v" style="color:${bad.length?'var(--red)':'var(--green)'}">${bad.length}</div></div>
    <div class="stat"><div class="k">ยังประเมินไม่ได้</div><div class="v" style="color:${NA.length?'var(--gold)':'var(--green)'}">${NA.length} <small>สัญญา</small></div></div>
    <div class="stat"><div class="k">ยอดขาดสะสม</div><div class="v" style="color:var(--red)">${B0(R.reduce((s,x)=>s+x.r.rows.reduce((a,w)=>a+(w.short||0),0),0))} <small>บาท</small></div></div>
    <div class="stat"><div class="k">ค่าทวงถามสะสม</div><div class="v">${B0(R.reduce((s,x)=>s+x.r.totFee,0))} <small>บาท</small></div></div>
  </div>${body}`;

  if(!cur) return;
  $("w_sel").onchange = e => { S.watch = e.target.value; drawT7(); };
  $("w_kind").onchange = () => drawWarn();
  ["w_no","w_d","w_days"].forEach(k=>$(k).onchange=()=>drawWarn());
  document.querySelectorAll("[data-fee]").forEach(i=>i.onchange=e=>{
    const [id,p]=e.target.dataset.fee.split(":"); setPer(id,p,"fee",+e.target.value||0); all(); });
  document.querySelectorAll("[data-rel]").forEach(i=>i.onchange=e=>{
    const [id,p]=e.target.dataset.rel.split(":"); setPer(id,p,"relief",e.target.checked); all(); });
  document.querySelectorAll("[data-relm]").forEach(i=>i.onchange=e=>{
    const [id,p]=e.target.dataset.relm.split(":"); setPer(id,p,"memo",e.target.value.trim()); all(); });
  $("w_print").onclick = () => { document.body.classList.add("wprint");
    setTimeout(()=>{ window.print(); document.body.classList.remove("wprint"); },250); };
  drawWarn();
}

function drawWarn(){
  const c = S.contracts.find(x=>x.id===S.watch); if(!c) return;
  $("wdoc").innerHTML = warnHTML(c, $("w_kind").value, $("w_no").value, $("w_d").value, +$("w_days").value||15);
}

/* ---------- หนังสือเตือน ---------- */

/* ============ จับคู่รายการโอน → สัญญา ============ */
function contractsOf(no){ return S.contracts.filter(c => c.no === no); }

const ruleKey = t => memOf(t) + "|" + (+t.m).toFixed(2);
// ถ้าคนหนึ่งมี N สัญญา และโอนเข้ามาเป็นยอดประจำ N ยอดพอดี → จับคู่ยอดใหญ่กับสัญญาก้อนใหญ่
const _am = {};
function amtMap(no){
  const k = no + "|" + S.tx.length + "|" + S.contracts.length;
  if (_am[k] !== undefined) return _am[k];
  const cs = contractsOf(no);
  if (cs.length < 2) return _am[k] = null;
  const mine = S.tx.filter(t => memOf(t) === no);
  const cnt = {};
  mine.forEach(t => { const a = (+t.m).toFixed(2); cnt[a] = (cnt[a]||0) + 1; });
  const rec = Object.keys(cnt).filter(a => cnt[a] >= 2);          // ยอดที่โอนซ้ำอย่างน้อย 2 ครั้ง
  if (rec.length !== cs.length) return _am[k] = null;             // ไม่พอดี → ไม่เดา
  const size = c => c.legacy ? (+c.open||0) : (+c.amt||0);
  const byAmt = rec.slice().sort((a,b) => +b - +a);
  const byBal = cs.slice().sort((a,b) => size(b) - size(a));
  if (size(byBal[byBal.length-1]) <= 0) return _am[k] = null;
  const map = {};
  byAmt.forEach((a,i) => map[a] = byBal[i].id);
  return _am[k] = map;
}
function autoAssign(t){                              // คืนค่า contractId | "share" | null(ต้องระบุ)
  const manual = S.assign[txKey(t)];
  if (manual) return manual;                         // 1. ระบุรายตัว
  const no = memOf(t);
  if (!no) return null;
  const rule = S.rule && S.rule[ruleKey(t)];
  if (rule) return rule;                             // 2. กฎ "ยอดนี้ของคนนี้ = สัญญานี้"
  // นับเฉพาะสัญญาที่มีผลแล้ว ณ วันที่โอน — สัญญาที่ทำทีหลังต้องไม่มาแย่งเงินงวดเก่า
  const cs = contractsOf(no).filter(c => c.legacy || !c.d || c.d <= t.d);
  if (!cs.length) return "share";                    // ยังไม่มีสัญญาที่มีผล → ฝากหุ้นล้วน
  const hit = cs.filter(c => c.inst > 0 && Math.abs(t.m - c.inst) <= 2);
  if (hit.length === 1) return hit[0].id;            // 3. ตรงกับ "งวดละ" ของสัญญาเดียว
  if (cs.length === 1) return (t.m < 600 && !cs[0].inst) ? "share" : cs[0].id;
  const am = amtMap(no);                             // 4. จับคู่จากรูปแบบยอดประจำ
  if (am && am[(+t.m).toFixed(2)] && cs.some(c => c.id === am[(+t.m).toFixed(2)])) return am[(+t.m).toFixed(2)];
  // 4. ถ้ายอดไม่ตรงกับสัญญาที่กรอกงวดละไว้เลย และเหลือสัญญาเดียวที่ยังไม่ได้กรอกงวดละ → เข้าอันนั้น
  const noInst = cs.filter(c => !c.inst);
  if (!hit.length && noInst.length === 1 && cs.length - noInst.length > 0) return noInst[0].id;  // 5.
  const live = cs.filter(c => runOpen(c));
  if (live.length === 1) return live[0].id;          // 5. เหลือสัญญาเดียวที่ยังมีหนี้
  return null;                                       // ยังแยกไม่ออก → ตั้งกฎที่แท็บ 2
}
// สัญญานี้ยังมีหนี้อยู่หรือไม่ (ประเมินหยาบ ๆ เพื่อเลี่ยงการเรียกซ้ำซ้อน)
const _ro = {};
function runOpen(c){
  const k = c.id + "|" + S.tx.length;
  if (_ro[k] !== undefined) return _ro[k];
  const paid = S.tx.reduce((a,t)=> a + ((S.assign[txKey(t)]===c.id) ? t.m : 0), 0);
  const base = c.legacy ? (+c.open||0) : (+c.amt||0);
  return _ro[k] = base > paid * 0.5;                 // ยังไม่น่าจะปิด
}

/* ============ เครื่องคำนวณ — รายสัญญา ============ */
function runContract(c){
  const recv = {}, txp = {};
  S.tx.forEach(t => { if (autoAssign(t) === c.id){ const p = periodOf(t.d);
    recv[p]=(recv[p]||0)+t.m; (txp[p]=txp[p]||[]).push(t); } });
  const start = periodOf(c.d);
  const flatInt = PROD[c.prod].method === "flat" ? +(c.amt * RATE).toFixed(2) : null;

  let bal = c.legacy ? +c.open : 0;
  const rows = []; let missed = 0, last = null, closed = null;

  PERIODS.forEach(p => {
    const got = +(recv[p]||0).toFixed(2);
    const txs = txp[p] || [];
    const md  = per(c.id, p), relief = !!md.relief;
    const nl  = (!c.legacy && p === start) ? +(+c.amt||0) : 0;
    if (!c.legacy && p < start){ rows.push({p, pre:true}); return; }

    if (bal <= 0.005 && !nl){
      if (got > 0) last = p;
      rows.push({p, got, due:0, short:0, int:0, sh:0, shB:0, shE:0, pri:0, bal:0, fee:0, done:true,
                 kind: got>0?"ชำระเกิน":"—", relief, late:false, txs});
      return;
    }
    if (nl) bal = +(bal + nl).toFixed(2);

    const tn    = c.legacy ? (+c.t0||0) + PERIODS.indexOf(p) + 1
                           : PERIODS.indexOf(p) - PERIODS.indexOf(start) + 1;
    const baseDue  = +c.shareM||0;
    const extraDue = c.mode==="old"  ? +(+c.exFix||0).toFixed(2)                                  // ตารางเดิม 2568 — คงที่
                   : c.mode==="calc" ? +((+c.inst||0)*extraRate(Math.max(1,tn))).toFixed(2)       // สูตร 2569 — ขั้นบันได
                   : 0;
    const shDue = +(baseDue + extraDue).toFixed(2);
    const int   = flatInt != null ? flatInt : +(bal * RATE).toFixed(2);
    // ประเมินได้ต่อเมื่อรู้ "งวดละ" จริง — ไม่มีก็ไม่เดา (ดูทะเบียนสัญญา แท็บ 1)
    const known = (+c.inst||0) > 0;
    const due   = known ? +(+c.inst).toFixed(2) : 0;
    const short = known ? +Math.max(0, due - got).toFixed(2) : 0;
    const kind  = known ? kindOf(got, int, due) : (got > 0 ? "รับชำระแล้ว" : "ไม่มีเงินเข้า");
    const fee   = known ? feeOf(c, p, got, due, txs) : 0;
    const late  = known && got > 0 && lateOf(c, p, txs);

    // ชำระปิดบัญชี — จ่ายพอสำหรับเงินต้น+ดอกเบี้ยทั้งก้อน → ปิดหนี้ ไม่หักหุ้นก่อนเงินต้น
    const payoff = got >= bal + int - 1 && got > 0 && bal > 0;
    let rest = got, note = "";
    let gInt, shB, shE, pri;
    if (payoff){
      gInt = Math.min(rest, int); rest -= gInt;
      pri  = +Math.min(rest, bal).toFixed(2); rest -= pri;         // เงินต้นก่อน — ปิดให้จบ
      shB  = Math.max(0, Math.min(rest, baseDue));  rest -= shB;   // ที่เหลือค่อยเข้าหุ้น
      shE  = Math.max(0, Math.min(rest, extraDue)); rest -= shE;
      note = "ชำระปิดบัญชี";
    } else {
      // จัดสรรตามข้อ 2.2 : ดอกเบี้ย → เงินฝากหุ้นประจำ → เงินฝากเพิ่ม → เงินต้น
      gInt = Math.min(rest, int); rest -= gInt;
      shB  = Math.max(0, Math.min(rest, baseDue));  rest -= shB;
      shE  = Math.max(0, Math.min(rest, extraDue)); rest -= shE;
      pri  = +rest.toFixed(2);
      if (pri > bal){ note = "ชำระปิดบัญชี"; pri = +bal.toFixed(2); }
    }
    const sh = +(shB + shE).toFixed(2);
    bal = +(bal - pri).toFixed(2);
    if (bal <= 0.005) bal = 0;

    // ข้อ 2.3 — ชำระไม่ครบ = ยังผิดนัด เว้นแต่ได้รับผ่อนผันเป็นหนังสือ (ข้อ 2.2)
    if (known && short > 0.005 && !relief) missed++; else if (known) { missed = 0; }
    if (got > 0) last = p;
    if (bal <= 0.005 && !closed) closed = p;
    rows.push({p, got, due, short, int:+gInt.toFixed(2), sh, shB, shE, shDue, baseDue, extraDue,
               pri, bal, fee, kind, relief, late, tn, known, memo:md.memo||"", note, opens:!!nl, nl, txs});
  });

  const assessed = (+c.inst||0) > 0;
  const status = bal <= 0.005 && (c.legacy || rows.some(r=>r.opens)) ? "ปิดหนี้แล้ว"
               : !assessed ? "ยังประเมินไม่ได้"
               : missed >= 1 ? `ค้าง ${missed} งวด` : "ปกติ";
  const T = f => +rows.reduce((s,r)=>s+(r[f]||0),0).toFixed(2);
  return {rows, bal, missed, last, closed, status, assessed,
          totGot:T("got"), totInt:T("int"), totSh:T("sh"), totShB:T("shB"), totShE:T("shE"),
          totPri:T("pri"), totFee:T("fee"), totShort:T("short"),
          nMiss:rows.filter(r=>r.known&&r.kind==="ไม่ชำระ"&&!r.relief).length,
          nInt:rows.filter(r=>r.known&&(r.kind==="ชำระเฉพาะดอกเบี้ย"||r.kind==="ไม่พอดอกเบี้ย")&&!r.relief).length,
          nPart:rows.filter(r=>r.known&&r.kind==="ชำระบางส่วน"&&!r.relief).length,
          nLate:rows.filter(r=>r.late).length};
}

function runMember(m){
  const cs = contractsOf(m.no).map(c => ({c, r: runContract(c)}));
  let shares = +m.share;
  S.tx.forEach(t => { if (memOf(t)===m.no && autoAssign(t)==="share") shares += t.m; });
  cs.forEach(x => shares += x.r.totSh);
  const bal = cs.reduce((s,x)=>s+x.r.bal, 0);
  return {cs, shares:+shares.toFixed(2), bal:+bal.toFixed(2)};
}

/* ============ ตรวจสอบ — ระบบกันปัญหาเดิมกลับมา ============ */
function checks(){
  const out = [];

  // 1 บัญชีผู้โอนที่จับคู่ไม่ได้
  const unk = [...new Set(S.tx.filter(t=>!memOf(t)).map(t=>t.a))];
  out.push({ok:!unk.length, t:"บัญชีผู้โอนจับคู่กับสมาชิกครบทุกบัญชี",
    p: unk.length ? `ยังเหลือ ${unk.map(a=>`<code>${a}</code>`).join(" ")} — เงินเข้าจากบัญชีเหล่านี้ยังไม่ถูกนับให้ใคร ไปผูกที่แท็บ «รับชำระ»`
                  : "ทุกบัญชีที่โอนเข้ามารู้ว่าเป็นของสมาชิกคนไหน"});

  // 2 รายการโอนที่ยังไม่รู้ว่าเข้าสัญญาไหน
  const amb = S.tx.filter(t => memOf(t) && autoAssign(t) === null);
  out.push({ok:!amb.length, t:"รายการโอนถูกจัดเข้าสัญญาครบทุกรายการ",
    p: amb.length ? `${amb.length} รายการยังแยกไม่ออกว่าเข้าสัญญาไหน (สมาชิกมีหลายสัญญา และยอดโอนไม่ตรงกับ «งวดละ» ของสัญญาใดเลย) — ระบุที่แท็บ «รับชำระ»`
                  : "เงินทุกบาทรู้ว่าเข้าสัญญาไหน"});

  // 3 เงินออก vs สัญญา
  const wdT = DB.wd.reduce((s,w)=>s+w.m, 0);
  const loT = S.contracts.filter(c=>!c.legacy).reduce((s,c)=>s+(+c.amt||0), 0);
  const gap = +(wdT - loT).toFixed(2);
  out.push({ok:Math.abs(gap)<0.01, t:"เงินที่ออกจากบัญชี มีสัญญารองรับครบ",
    p: Math.abs(gap)<0.01 ? `ถอนออก ${B(wdT)} = สัญญาใหม่ ${B(loT)} ✓`
      : `ถอนออกจริง <code>${B(wdT)}</code> · บันทึกสัญญาไว้ <code>${B(loT)}</code> · <b>ยังอธิบายไม่ได้ ${B(gap)} บาท</b>`});

  // 4 โควตาโครงการดูแลกัน
  const dk = S.contracts.filter(c=>c.prod==="ดูแลกัน");
  const dkOut = dk.reduce((s,c)=>s+runContract(c).bal, 0);
  const q = PROD["ดูแลกัน"];
  out.push({ok:dkOut<=q.quota && dk.length<=q.slots, warn:dkOut>q.quota*0.8,
    t:"เพดานโครงการสินเชื่อดูแลกัน",
    p:`ใช้ไป <code>${B(dkOut)}</code> / ${B0(q.quota)} บาท · <code>${dk.length}</code> / ${q.slots} สิทธิ์ · เหลือ <b>${B(q.quota-dkOut)}</b> บาท`});

  // 5 สัญญาข้อมูลไม่ครบ
  const bad = S.contracts.filter(c => !c.amt || !c.terms || !c.inst);
  out.push({ok:!bad.length, t:"สัญญาทุกฉบับกรอกข้อมูลครบ",
    p: bad.length ? `${bad.length} ฉบับยังขาด วงเงิน / งวด / ยอดงวดละ — <b>ตราบใดที่ยังไม่ครบ ยอดหนี้ของคนเหล่านี้ยังเชื่อไม่ได้</b>`
                  : "ทุกสัญญามีวงเงิน จำนวนงวด และยอดงวดละ"});

  // 6 เงื่อนไขผลิตภัณฑ์
  const vio = [];
  S.contracts.forEach(c => { const P = PROD[c.prod]; if(!P) return;
    if (P.maxAmt && c.amt > P.maxAmt) vio.push(`${c.no} ${c.prod} วงเงิน ${B(c.amt)} เกิน ${B0(P.maxAmt)}`);
    if (P.maxTerms && c.terms > P.maxTerms) vio.push(`${c.no} ${c.prod} ${c.terms} งวด เกิน ${P.maxTerms}`);
    if (!c.legacy && P.guar===2 && !(c.g1 && c.g2)) vio.push(`${c.no} สามัญ ต้องมีผู้ค้ำ 2 คน`);
    if (!c.legacy && P.guar===1 && !c.g1) vio.push(`${c.no} ดูแลกัน ต้องมีผู้ค้ำ 1 คน`);
  });
  out.push({ok:!vio.length, t:"ทุกสัญญาอยู่ในกรอบระเบียบของผลิตภัณฑ์",
    p: vio.length ? vio.map(v=>`• ${v}`).join("<br>") : "วงเงิน จำนวนงวด และจำนวนผู้ค้ำ ถูกต้องตามประกาศโครงการทุกฉบับ"});

  // 6b เพดานผู้ค้ำ
  const gover = DB.members.map(m=>({m, a:activeGuar(m.no)})).filter(x=>x.a.length>GUAR_MAX);
  const gblk  = S.contracts.filter(c=>!c.legacy).flatMap(c=>[c.g1,c.g2].filter(Boolean)
      .filter(g=>{ const a=activeGuar(g); return a.length>GUAR_MAX; })
      .map(g=>{ const z=DB.members.find(y=>y.no===g); return `${z?z.name:g} ค้ำ ${activeGuar(g).length} สัญญา`; }));
  out.push({ok:!gover.length, t:`ไม่มีใครค้ำเกินเพดาน ${GUAR_MAX} สัญญา`,
    p: gover.length ? [...new Set(gblk)].map(v=>`• ${v}`).join("<br>")
      : `ผู้ค้ำทุกคนอยู่ในเพดาน ${GUAR_MAX} สัญญา · นับเฉพาะสัญญาที่ยังมีหนี้คงเหลือ`});

  // 7 ค้างชำระ
  const due = S.contracts.map(c=>({c, r:runContract(c)})).filter(x=>x.r.missed>0 && x.r.bal>0.005);
  out.push({ok:!due.length, warn:due.length>0, t:"สถานะการค้างชำระของผู้กู้",
    p: due.length ? due.map(x=>{const m=DB.members.find(z=>z.no===x.c.no);
        return `• <b>${m?m.name:x.c.no}</b> (${x.c.prod}) ค้าง ${x.r.missed} งวด · คงเหลือ ${B(x.r.bal)}`;}).join("<br>")
      : "ทุกสัญญาชำระเป็นปกติ"});

  return out;
}

/* ============ อ่านตารางผ่อนเดิม (รูปแบบเครื่องคำนวณ กบข.นข.) ============ */
// ไม่เดาจากความถี่แล้ว — อ่านจากป้ายกำกับตรง ๆ
function pdfGuess(txt){
  const t = txt.replace(/\u00A0/g," ").replace(/\s+/g," ");
  const N = re => { const m = t.match(re); return m ? +String(m[1]).replace(/,/g,"") : 0; };
  const o = {
    no:    (t.match(/เลขที่สมาชิก\s*:?\s*(\d{1,3})/)||[])[1] || "",
    name:  ((t.match(/ชื่อ\s*:?\s*(?:คุณ|นาย|นาง|นางสาว)?\s*([^\d]{2,45}?)\s*(?:จำนวนงวด|อัตรา)/)||[])[1]||"").trim(),
    terms: N(/จำนวนงวด\s*:?\s*([\d,]+)/),
    rate:  N(/อัตราดอกเบี้ย\s*\/?\s*เดือน\s*:?\s*([\d.]+)/),
    base:  N(/ฝาก(?:เงิน)?หุ้นประจำ\s*:?\s*([\d,]+(?:\.\d+)?)/),
    exPct: N(/ฝากหุ้นเพิ่มเติม\s*\(\s*([\d.]+)\s*%/),
    exAmt: N(/ฝากหุ้นเพิ่มเติม\s*\([^)]*\)\s*:?\s*([\d,]+(?:\.\d+)?)/),
    pi:    N(/ยอดชำระ\s*\(\s*เงินต้น\s*\+\s*ดอกเบี้ย\s*\)\s*:?\s*([\d,]+(?:\.\d+)?)/),
    inst:  N(/รวมยอดชำระต่อเดือน\s*:?\s*([\d,]+(?:\.\d+)?)/),
    amt:   N(/วงเงินกู้สูงสุด\s*:?\s*([\d,]+(?:\.\d+)?)/),
    totInt:N(/ดอกเบี้ยรวมทั้งหมด\s*:?\s*([\d,]+(?:\.\d+)?)/),
    rows: []
  };
  // ตารางรายงวด: งวด | ยอดส่ง | เงินต้น | ดอกเบี้ย | ฝากหุ้น | ฝากเพิ่ม | คงเหลือ
  const rx = /(\d{1,2})\s+([\d,]+\.\d{2})\s+([\d,]+\.\d{2})\s+([\d,]+(?:\.\d{1,2})?)\s+([\d,]+(?:\.\d{1,2})?)\s+([\d,]+\.\d{2})\s+([\d,]+(?:\.\d{1,2})?)/g;
  const f = x => +String(x).replace(/,/g,"");
  let m;
  while((m = rx.exec(t))){
    const r = {t:+m[1], pay:f(m[2]), pri:f(m[3]), int:f(m[4]), base:f(m[5]), ex:f(m[6]), bal:f(m[7])};
    // กันแถวมั่ว: ยอดส่งต้องตรงกับที่หัวตารางบอก
    if(!o.inst || Math.abs(r.pay - o.inst) <= 1) o.rows.push(r);
  }
  o.ok = !!(o.inst && o.amt && o.terms);
  return o;
}

// หาว่าผ่อนไปแล้วกี่งวด จากยอดยกมาที่มีอยู่ในระบบ
function findT0(g, open){
  if(!g.rows.length || !open) return null;
  let best = null;
  g.rows.forEach(r=>{ const d = Math.abs(r.bal - open);
    if(d <= 2 && (!best || d < best.d)) best = {t:r.t, d, bal:r.bal}; });
  return best;
}

async function pdfText(buf){
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let out = "";
  for(let i=1;i<=pdf.numPages;i++){
    const tc = await (await pdf.getPage(i)).getTextContent();
    const lines = {};
    tc.items.forEach(it=>{ const y = Math.round(it.transform[5]);
      (lines[y]=lines[y]||[]).push({x:it.transform[4], s:it.str}); });
    Object.keys(lines).map(Number).sort((a,b)=>b-a).forEach(y=>{
      out += lines[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(" ").replace(/\s+/g," ") + "\n"; });
  }
  return out;
}
function parse(text){
  const out = [];
  text.split(/\r?\n/).forEach(ln => {
    if(!/รับโอน|โอนเข้า/.test(ln)) return;
    const d = ln.match(/(\d{2})-(\d{2})-(\d{2})/), t = ln.match(/(\d{2}:\d{2})/), a = ln.match(/(X\d{4})/);
    if(!d||!t||!a) return;
    const n = [...ln.matchAll(/(\d{1,3}(?:,\d{3})*\.\d{2})/g)].map(x=>parseFloat(x[1].replace(/,/g,"")));
    if(!n.length) return;
    out.push({a:a[1], d:`20${d[3]}-${d[2]}-${d[1]}`, t:t[1], m:n[0]});
  });
  return out;
}

const DIV_SHARE = 0.045, DIV_INT = 0.065;      // อัตราปันผลที่ใช้ปีก่อน (ประมาณการ)

/* ภาระค้ำประกันของสมาชิก — สัญญาข้อ 4.2 */
function guarOf(no){
  return S.contracts.filter(c => c.g1===no || c.g2===no).map(c => {
    const r = runContract(c), n = r.missed;
    let pct = 0, base = 0, lbl = "ยังไม่มีความรับผิด";
    if (n >= 12){ pct = .80; base = r.bal;            lbl = "รับผิดสูงสุด 80% ของหนี้คงเหลือ"; }
    else if (n >= 6){ pct = .50; base = (+c.inst||0)*3; lbl = "รับผิด 50% ของยอดงวดที่ 4–6"; }
    else if (n >= 3){ pct = .20; base = (+c.inst||0)*2; lbl = "รับผิด 20% ของยอดงวดที่ 2–3"; }
    else if (n >= 1) lbl = "ต้องแจ้งเตือนและติดตามผู้กู้";
    return {c, r, n, lbl, amt: +(pct*base).toFixed(2)};
  });
}

/* ============ แปลงตัวเลขเป็นตัวอักษรไทย ============ */
function bahtText(n){
  n = Math.round((+n||0)*100)/100;
  const D=["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
  const U=["","สิบ","ร้อย","พัน","หมื่น","แสน"];
  function grp(s){                       // s ≤ 6 หลัก
    let t="";
    for(let i=0;i<s.length;i++){
      const d=+s[i], p=s.length-i-1;
      if(!d) continue;
      if(p===0 && d===1 && s.length>1) t+="เอ็ด";
      else if(p===1 && d===1) t+="สิบ";
      else if(p===1 && d===2) t+="ยี่สิบ";
      else t += D[d]+U[p];
    }
    return t;
  }
  function whole(x){
    x = String(x);
    if(x==="0") return "ศูนย์";
    let t="";
    while(x.length>6){ t += grp(x.slice(0,x.length-6))+"ล้าน"; x = x.slice(-6); }
    return t + grp(x);
  }
  const i = Math.floor(n), f = Math.round((n-i)*100);
  return whole(i)+"บาท" + (f ? whole(f)+"สตางค์" : "ถ้วน");
}


/* ============ เครื่องคำนวณวงเงินกู้สูงสุด (โปรแกรมคำนวณใหม่ 2569 V2) ============ */
// หุ้นเพิ่ม = % ของยอดหักได้/เดือน โดยขั้นบันไดตามงวด
function extraRate(t){
  if(t<=12) return 0.08; if(t<=24) return 0.10; if(t<=36) return 0.12;
  if(t<=48) return 0.14; if(t<=60) return 0.16; return 0.18;
}
// วงเงินกู้สูงสุด = Σ (M − B − E_t) / (1+i)^t
function maxPrincipal(M,B,N,i){
  let P=0; for(let t=1;t<=N;t++) P += (M - B - M*extraRate(t)) / Math.pow(1+i,t);
  return +P.toFixed(2);
}
// ย้อนสูตร: กรอกวงเงินที่ต้องการ → ได้ยอดที่ต้องส่ง/เดือน
// P0 = M·Σ(1−E_t)/(1+i)^t − B·Σ1/(1+i)^t  →  M = (P0 + B·A) / C
function reqPayment(P0,B,N,i){
  let A=0, C=0;
  for(let t=1;t<=N;t++){ const df=Math.pow(1+i,-t); A+=df; C+=(1-extraRate(t))*df; }
  return C>0 ? +((P0 + B*A)/C).toFixed(2) : 0;
}
function shareAt(c,t){
  return c.mode==="calc" ? +((+c.shareM||0) + (+c.inst||0)*extraRate(t)).toFixed(2) : (+c.shareM||0);
}

/* ตารางผ่อน — รองรับทั้งสูตรใหม่ (calc) และคงที่ (fixed/flat) */
function schedule(c){
  const flat = PROD[c.prod].method==="flat";
  const N = +c.terms||0, M = +c.inst||0;
  let bal = +c.amt||0; const rows=[];
  for(let t=1; t<=N && t<=120; t++){
    const sh  = shareAt(c,t);
    const int = flat ? +((+c.amt||0)*RATE).toFixed(2) : +(bal*RATE).toFixed(2);
    let pri = +(M - sh - int).toFixed(2);
    if(t===N || pri>bal) pri = +bal.toFixed(2);
    bal = +(bal-pri).toFixed(2);
    rows.push({t, pay:+(pri+int+sh).toFixed(2), pri, int, base:+c.shareM||0,
               extra:+(sh-(+c.shareM||0)).toFixed(2), sh, bal});
    if(bal<=0.005) break;
  }
  const T = f => +rows.reduce((s,r)=>s+r[f],0).toFixed(2);
  return {rows, totInt:T("int"), totSh:T("sh"), totBase:T("base"), totExtra:T("extra"),
          totPri:T("pri"), totPay:T("pay"), ok:bal<=0.005};
}
function capOf(c){ return c.cap || Math.ceil(((+c.amt||0)+schedule(c).totInt)/1000)*1000; }

    <p class="i">2.2 ผู้กู้ไม่มีสิทธิอ้างการชำระบางส่วนเพื่อระงับความเป็นผิดนัด เว้นแต่คณะกรรมการบริหารอนุมัติเป็นหนังสือ การรับชำระในกรณีปกติ ให้จัดสรรตามลำดับ <b>ดอกเบี้ย → เงินฝากหุ้นประจำ → เงินฝากเพิ่ม → เงินต้น</b> ตามหมวด 4 ข้อ 1.1 ของข้อตกลง</p>
    <p class="i">2.3 หากผู้กู้ชำระไม่ครบตามยอดงวดหรือองค์ประกอบที่กำหนด ให้ถือว่ายังคงผิดนัด แม้ผู้ให้กู้จะรับชำระบางส่วนไว้ก็ตาม</p>`;

  const p3 = `<p class="i">2.4 ห้ามใช้เงินฝากสะสมในกลุ่มบุคคลมาหักลบกับยอดหนี้ที่ค้างชำระ การปิดหนี้ก่อนกำหนดต้องใช้เงินจากแหล่งอื่นเท่านั้น</p>
    <p class="i">2.5 อัตราดอกเบี้ยเท่ากับ <b>1.00% ต่อเดือน (ลดต้นลดดอก)</b> อยู่ภายใต้ช่วง 1.00–1.20% ต่อเดือนตามมติที่ประชุมใหญ่ของสมาชิก และคำนวณจากยอดเงินต้นคงเหลือ</p>
    <p class="i">2.6 การชำระคืนเงินกู้ต้องดำเนินการผ่านช่องทางที่คณะกรรมการกำหนด และผู้กู้ต้องเก็บหลักฐานการชำระเงินทุกครั้ง เช่น ใบเสร็จรับเงิน, หลักฐานการโอนเงินทางธนาคาร หรือหลักฐานที่ได้รับการรับรองจากคณะกรรมการบริหารกลุ่มบุคคล</p>
    <p class="i">2.7 หากผู้กู้ยังมียอดหนี้ค้างชำระ จะไม่มีสิทธิ์ขอถอนทุนคืนจากกลุ่มบุคคล จนกว่าจะปิดหนี้ทั้งหมด</p>
    <p class="i">2.8 การปรับเปลี่ยนอัตราดอกเบี้ยทำได้เมื่อได้รับความเห็นชอบจากที่ประชุมใหญ่ของสมาชิกไม่น้อยกว่า 80% ของผู้เข้าประชุม และจะแจ้งให้ผู้กู้ทราบล่วงหน้าไม่น้อยกว่า 60 วัน ก่อนมีผลบังคับใช้</p>

    <p class="i">2.10 <b>ช่วงผิดนัด</b> เมื่อมีหนี้ค้าง การรับชำระจะจัดสรรตามลำดับ <b>ค่าธรรมเนียมทวงถาม → ดอกเบี้ยผิดนัด/ดอกเบี้ยค้าง → เงินฝากหุ้นค้างงวด → ดอกเบี้ยปกติของงวดปัจจุบัน (ถ้ามี) → เงินต้น</b> เว้นแต่คู่สัญญาตกลงเป็นหนังสือเป็นอย่างอื่น ทั้งนี้ เงินหุ้นสะสมจะไม่ถูกนำมาหักกลบโดยพลการ</p>
    <p class="i">2.11 <b>เพดานดอกผล</b> ดอกเบี้ยปกติ ดอกเบี้ยผิดนัด และค่าธรรมเนียมทางการเงินใด ๆ รวมกันต้องไม่เกินอัตราสูงสุดที่กฎหมายอนุญาตในขณะนั้น</p>
    <div class="h">ข้อ 3. เงื่อนไขเมื่อผู้กู้ผิดนัดชำระหนี้</div>
    <p class="i">3.1 หากเกิน 5 วันนับแต่ถึงกำหนดชำระ ให้เรียกเก็บค่าธรรมเนียมทวงถาม 5% ของยอดงวดที่ถึงกำหนด แต่ไม่เกิน 100 บาท/ครั้ง และไม่เกิน 2 ครั้ง/เดือน (ไม่รวมอยู่ในดอกเบี้ยผิดนัด)</p>
    <p class="i">3.2 หากผู้กู้ผิดนัดเกิน 90 วัน ให้คิดดอกเบี้ยผิดนัด 1.20% ต่อเดือน (14.4% ต่อปี) จากยอดค้างชำระ</p>
    <p class="i">3.3 หากผู้กู้ผิดนัดเกิน 1 ปีติดต่อกัน และยังไม่ชำระครบถ้วน (รวมเงินต้น ดอกเบี้ย และเงินฝากหุ้นค้างงวด) ผู้ให้กู้มีสิทธิยกระดับเป็นคดี ตามหมวด 7 ของข้อตกลง ภายหลังได้บอกกล่าวตามข้อ 3.5 แล้ว</p>
    <p class="i">3.4 การชำระเพื่อระงับการดำเนินคดี ต้องชำระครบทุกส่วนที่ถึงกำหนด ได้แก่ เงินต้น ดอกเบี้ย ดอกเบี้ยผิดนัด เงินฝากหุ้นค้างงวด และค่าธรรมเนียมที่เกิดขึ้น</p>
    <p class="i">3.5 <b>การบอกกล่าว/การแจ้งผู้ค้ำ</b> ผู้ให้กู้จะออกหนังสือแจ้งเตือนอย่างน้อยหนึ่งครั้งภายใน 90 วันนับแต่ผิดนัดครั้งแรก และส่งบอกกล่าวทวงถามฉบับยืนยันก่อนฟ้องคดีอีกครั้งตามควร กรณีผู้ค้ำประกัน ให้ส่งหนังสือแจ้งแก่ผู้ค้ำภายใน 90 วัน นับแต่ผิดนัดครั้งแรก การส่งไปยังที่อยู่หรือช่องทางล่าสุดที่ผู้ค้ำแจ้งไว้ ให้ถือว่าได้แจ้งแล้ว</p>

      โดยมีการประชุมในวันที่ <b class="f">${BOARD.meet}</b></p>
    <div class="keybox" style="margin-top:12px"><b>บันทึกการใช้งานในระบบ</b>
      <ul class="ul"><li>ชื่อในคำสั่งนี้ถูกใช้เติมช่องลงนามอัตโนมัติในทุกเอกสารของระบบ —
        สัญญาเงินกู้ · สัญญาค้ำประกัน · ตารางชำระหนี้ · แบบคำขอกู้ · ใบเสร็จ · หนังสือเตือน</li>
        <li>หากมีการเปลี่ยนแปลงคณะกรรมการ ต้องแก้ที่คำสั่งแต่งตั้งฉบับใหม่ แล้วปรับในระบบ เอกสารทั้งหมดจะเปลี่ยนตามทันที</li></ul></div>
    <div class="ksigs" style="grid-template-columns:1fr;max-width:300px;margin:22px auto 0">
      ${sigOf("ประธานกลุ่มบุคคล", CHAIR())}
      <div style="text-align:center" class="kh">วันที่ ......../......../ ..........</div>
    </div>`;

  return [p1,p2].map((b,i)=>pg(i+1,2,b,"คณะกรรมการ")).join("");
}

/* ============ แท็บ 5 — พิมพ์ชุดสัญญา ============ */
let docMode = "full", docPick = {loan:1, guar:1, consent:1, sched:1};
function drawT5(){
  const list = S.contracts.filter(c=>!c.legacy);
  const cur = S.contracts.find(x=>x.id===S.pick) || list[0];
  if(cur) S.pick = cur.id;
  const opts = list.map(c=>{const m=DB.members.find(z=>z.no===c.no);
    return `<option value="${c.id}" ${c.id===S.pick?"selected":""}>${c.no} · ${esc(m?m.name:"")} · ${c.prod} · ${B(c.amt)} บาท</option>`;}).join("");

  const people = cur ? [[cur.no,"ผู้กู้"],[cur.g1,"ผู้ค้ำ 1"],[cur.g2,"ผู้ค้ำ 2"]].filter(x=>x[0]) : [];
  const pf = (no,role)=>{ const m=DB.members.find(z=>z.no===no)||{name:""}, p=prof(no);
    return `<tr><td class="l"><span class="no">${no}</span>${esc(m.name)} <span class="pill">${role}</span></td>
      <td><input data-pf="${no}:cid" value="${esc(p.cid||"")}" placeholder="เลขบัตรประชาชน" style="width:150px"></td>
      <td><input data-pf="${no}:pos" value="${esc(p.pos||"")}" placeholder="ตำแหน่ง" style="width:120px"></td>
      <td><input data-pf="${no}:tel" value="${esc(p.tel||"")}" placeholder="โทร" style="width:110px"></td>
      <td><input data-pf="${no}:addr" value="${esc(p.addr||"")}" placeholder="ที่อยู่ตามทะเบียนบ้าน"></td></tr>`; };
  const b = (cur && cur.ben) || {};

  $("tab5").innerHTML = `
  <div class="card">
    <div class="eyebrow">เลือกสัญญาที่จะพิมพ์</div>
    <div class="grid" style="grid-template-columns:1fr auto auto">
      <div><label>สัญญาในทะเบียน</label><select id="k_sel">${opts||'<option value="">— ยังไม่มีสัญญาใหม่ในทะเบียน —</option>'}</select></div>
      <div><label>วงเงินรับผิดผู้ค้ำ/คน</label><input type="number" id="k_cap" step="1000" style="width:120px"></div>
      <div><label>&nbsp;</label><button id="k_print">พิมพ์ชุดสัญญา</button></div>
    </div>
    <div class="bar" style="border-top:1px solid var(--rule);padding-top:10px;margin-top:11px">
      <span class="hint" style="margin:0">เอกสารที่จะพิมพ์:</span>
      ${[["loan","สัญญาเงินกู้"],["guar","สัญญาค้ำประกัน"],["consent","หนังสือยินยอมเป็นผู้ค้ำ"],["sched","ตารางการชำระหนี้"]]
        .map(([k,t])=>`<label style="margin:0;font-weight:400;font-size:12.5px;display:flex;gap:5px;align-items:center">
        <input type="checkbox" data-dp="${k}" ${docPick[k]?"checked":""} style="width:14px;height:14px;accent-color:var(--red)"> ${t}</label>`).join("")}
      <span class="hint" style="margin-left:auto">รูปแบบ:</span>
      <select id="k_mode" style="width:auto"><option value="full" ${docMode==="full"?"selected":""}>ข้อความครบตามต้นฉบับ</option>
        <option value="short" ${docMode==="short"?"selected":""}>ฉบับย่อ (อ้างข้อกำหนดมาตรฐาน)</option></select>
    </div>
    <p class="hint" id="k_warn" style="margin-top:9px"></p>
  </div>

  ${cur ? `<div class="card">
    <div class="eyebrow">ข้อมูลบุคคล — กรอกครั้งเดียว ระบบจำไว้ใช้ทุกสัญญา</div>
    <div class="tbl"><table><thead><tr><th class="l">ชื่อ</th><th class="l">เลขบัตรประชาชน</th>
      <th class="l">ตำแหน่ง</th><th class="l">โทร</th><th class="l">ที่อยู่ตามทะเบียนบ้าน</th></tr></thead>
      <tbody>${people.map(([no,r])=>pf(no,r)).join("")}</tbody></table></div>
    <div class="eyebrow" style="margin-top:14px">ผู้รับผลประโยชน์ของสัญญานี้ (ข้อ 6.5) — เว้นว่างได้</div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
      <div><label>ชื่อ-สกุล</label><input data-bn="name" value="${esc(b.name||"")}"></div>
      <div><label>เลขบัตรประชาชน</label><input data-bn="cid" value="${esc(b.cid||"")}"></div>
      <div><label>ความสัมพันธ์</label><input data-bn="rel" value="${esc(b.rel||"")}"></div>
      <div><label>เบอร์ติดต่อ</label><input data-bn="tel" value="${esc(b.tel||"")}"></div>
    </div>
    <p class="hint" style="margin-top:8px">หากไม่ระบุ สัญญาข้อ 6.5 กำหนดให้เงินฝากสะสมคงเหลือหลังหักหนี้ตกเป็นของกองทุน</p>
  </div>` : ""}
  <div id="kdoc"></div>`;

  if(!cur){ $("k_warn").textContent = "ไปที่แท็บ 6 เพื่อคำนวณวงเงินและสร้างสัญญาใหม่ หรือเพิ่มที่แท็บ 1"; return; }

  $("k_cap").value = capOf(cur);
  const s = schedule(cur), P = PROD[cur.prod], bad = [];
  if(!cur.amt||!cur.terms||!cur.inst) bad.push("ยังกรอก วงเงิน / งวด / งวดละ ไม่ครบ");
  if(!cur.code) bad.push("ยังไม่มีเลขที่สัญญา");
  if(P.guar===2 && !(cur.g1&&cur.g2)) bad.push("ต้องมีผู้ค้ำ 2 คน");
  if(P.guar===1 && !cur.g1) bad.push("ต้องมีผู้ค้ำ 1 คน");
  if(!s.ok) bad.push("ยอดงวดละไม่พอปิดหนี้ภายในจำนวนงวดที่ระบุ");
  const noProf = people.filter(([no])=>!prof(no).cid || !prof(no).addr).map(([no,r])=>r);
  if(noProf.length) bad.push(`ยังไม่มีเลขบัตร/ที่อยู่ของ ${noProf.join(", ")} (พิมพ์ได้ แต่จะเว้นช่องให้เขียนมือ)`);

  const gN = P.guar===2 ? 2 : 1;
  const pages = (docPick.loan?7:0) + (docPick.guar?5*gN:0) + (docPick.consent?2*gN:0) + (docPick.sched?1:0);
  const hard = bad.filter(x=>!x.startsWith("ยังไม่มีเลขบัตร"));
  $("k_warn").innerHTML = hard.length ? `<b style="color:var(--red)">ยังพิมพ์ไม่ได้:</b> ${hard.join(" · ")}`
    : `<b style="color:var(--green)">พร้อมพิมพ์</b> · ${pages} หน้า` + (bad.length>hard.length?` · <span style="color:#8A6400">${bad[bad.length-1]}</span>`:"");
  $("k_print").disabled = hard.length>0;

  const cap = +$("k_cap").value || capOf(cur);
  let out = "";
  if(docMode==="short"){ out = contractHTML(cur, cap, !!docPick.sched); }
  else {
    if(docPick.loan) out += docLoan(cur);
    if(docPick.guar) for(let i=1;i<=gN;i++) out += docGuar(cur,i);
    if(docPick.consent) for(let i=1;i<=gN;i++) out += docConsent(cur,i);
    if(docPick.sched) out += docSched(cur);
  }
  $("kdoc").innerHTML = out;

  $("k_sel").onchange = e => { S.pick = e.target.value; drawT5(); };
  $("k_cap").onchange = e => { cur.cap = +e.target.value||0; all(); };
  $("k_mode").onchange = e => { docMode = e.target.value; drawT5(); };
  document.querySelectorAll("[data-dp]").forEach(i=>i.onchange=e=>{ docPick[e.target.dataset.dp]=e.target.checked?1:0; drawT5(); });
  document.querySelectorAll("[data-pf]").forEach(i=>i.onchange=e=>{
    const [no,f]=e.target.dataset.pf.split(":");
    S.profile = S.profile||{}; S.profile[no]=S.profile[no]||{}; S.profile[no][f]=e.target.value.trim(); all(); });
  document.querySelectorAll("[data-bn]").forEach(i=>i.onchange=e=>{
    cur.ben = cur.ben||{}; cur.ben[e.target.dataset.bn]=e.target.value.trim(); all(); });
  $("k_print").onclick = () => { document.body.classList.add("kprint");
    setTimeout(()=>{ window.print(); document.body.classList.remove("kprint"); }, 250); };
}

function calcRun(){
  const M = +$("c_M").value||0, B = +$("c_B").value||0, want = +$("c_W").value||0,
        N = Math.max(1, Math.min(72, parseInt($("c_N").value||"1",10))),
        i = (+$("c_i").value||0)/100, prod = $("c_prod").value, P = PROD[prod];
  if(M<=0){ $("c_err").textContent="กรุณากรอกยอดที่หักได้/เดือน (> 0)"; return; }
  if(P.maxTerms && N > P.maxTerms &&
     !confirm(`โครงการ${prod}ผ่อนได้ไม่เกิน ${P.maxTerms} งวด แต่กรอกมา ${N} งวด\n\nจะคำนวณต่อหรือไม่? (สัญญาที่เกินเกณฑ์จะขึ้นเตือนในแท็บตรวจสอบ)`)) return;
  for(let t=1;t<=N;t++) if(M-B-M*extraRate(t) <= 0){
    $("c_err").textContent=`ยอดหักได้ไม่พอ — งวดที่ ${t} จะเหลือเงินต้น+ดอกเบี้ย ≤ 0 · เพิ่มยอดหักได้ / ลดหุ้นประจำ / ลดจำนวนงวด`; return; }
  $("c_err").textContent="";

  const cap = maxPrincipal(M,B,N,i);          // เพดานที่ยอดหักได้รองรับ
  // กรอกยอดที่ขอ → ใช้ยอดนั้นเป็นวงเงิน แล้วคิดยอดผ่อนจากยอดนั้น · ไม่กรอก → ใช้เพดาน
  const P0   = want>0 ? want : cap;
  const Mpay = want>0 ? reqPayment(want,B,N,i) : M;
  CV = {M, B, N, i, want, prod, cap, P0, Mpay};
  renderCalc();
}

function renderCalc(){
  const {M, B:bs, N, i, want, cap, P0, Mpay} = CV;
  const tmp = {prod:CV.prod, mode:"calc", amt:P0, terms:N, inst:Mpay, shareM:bs};
  const s = schedule(tmp);
  const over  = want > 0 && Mpay > M + 0.005;      // ขอเกินความสามารถชำระ
  const slack = want > 0 ? +(M - Mpay).toFixed(2) : 0;
  const opts = DB.members.map(m=>`<option value="${m.no}">${m.no} — ${esc(m.name)}</option>`).join("");
  const capNew = Math.ceil((P0 + s.totInt)/1000)*1000;

  $("c_out").innerHTML = `
  <div class="card" style="border-left:3px solid ${over?"var(--red)":"var(--green)"};margin-bottom:14px">
    ${want>0 ? `<div class="bar" style="margin:0;justify-content:space-between;flex-wrap:wrap">

/* ============ ทะเบียนคุม ============ */
const GUAR_MAX = 3;                                  // ค้ำได้ไม่เกิน 3 สัญญาพร้อมกัน
const WD_STATES = ["", "ยื่นคำขอถอนทุน", "อนุมัติถอนทุนแล้ว", "ลาออก", "เกษียณ"];

function activeGuar(no){                             // สัญญาที่ยังมีหนี้ ซึ่งผู้นี้ค้ำอยู่
  return S.contracts.filter(c=>(c.g1===no||c.g2===no) && runContract(c).bal>0.005);
}
function guarBlock(no){                              // เหตุที่ค้ำเพิ่มไม่ได้ (คืน "" = ค้ำได้)
  const a = activeGuar(no);
  if(a.length >= GUAR_MAX){
    const who = a.map(c=>{const m=DB.members.find(z=>z.no===c.no);return m?m.name:c.no;}).join(", ");
    return `ค้ำครบ ${GUAR_MAX} สัญญาแล้ว (${who})`;
  }
  const m = DB.members.find(z=>z.no===no); if(!m) return "ไม่พบในทะเบียนสมาชิก";
  const r = runMember(m);
  if(r.cs.some(x=>x.r.missed>0 && x.r.bal>0.005)) return "ตนเองมีงวดค้างชำระอยู่";
  if((prof(no).wd||"").startsWith("อนุมัติถอนทุน") || prof(no).wd==="ลาออก")
    return `สถานะ “${prof(no).wd}” — ไม่คงสถานะสมาชิก (สัญญาค้ำข้อ 1.10)`;
  return "";
}
// สถานะการชำระ — รวมทุกสัญญาของสมาชิก พร้อมจำนวนงวด
function payStat(no){
  const m = DB.members.find(z=>z.no===no);
  if(!m) return {t:"—", cls:""};
  const r = runMember(m);
  if(!r.cs.length) return {t:"ผู้ฝาก", cls:""};
  if(r.bal<=0.005) return {t:"ปิดยอดชำระ", cls:"grn"};
  if(r.cs.every(x=>!x.r.assessed)) return {t:"ยังประเมินไม่ได้ — ยังไม่กรอก «งวดละ»", cls:"yel"};
  const S2 = {miss:0, io:0, part:0, late:0};
  r.cs.forEach(x=>{ S2.miss+=x.r.nMiss; S2.io+=x.r.nInt; S2.part+=x.r.nPart; S2.late+=x.r.nLate; });
  const p = [];
  if(S2.miss) p.push(`ค้างชำระ ${S2.miss} งวด`);
  if(S2.io)   p.push(`ชำระเพียงดอกเบี้ย ${S2.io} งวด`);
  if(S2.part) p.push(`ชำระบางส่วน ${S2.part} งวด`);
  if(S2.late) p.push(`ชำระล่าช้า ${S2.late} งวด`);
  return p.length ? {t:p.join(" · "), cls:(S2.miss||S2.io||S2.part)?"red":"yel"} : {t:"ปกติ", cls:"grn"};
}
function memStatus(no){ return payStat(no).t; }
const ST_CLS = s => s.includes("ยังประเมินไม่ได้")?"yel"
  : (s.includes("ค้าง")||s.includes("เพียงดอกเบี้ย")||s.includes("บางส่วน"))?"red"
  : s.includes("ล่าช้า")?"yel" : (s==="ปิดยอดชำระ"||s==="ปิดหนี้แล้ว"||s==="ปกติ")?"grn"
  : s.includes("ถอนทุน")?"yel" : "";

function genCode(c){
  const yr = "69";
  if(c.prod==="ดูแลกัน"){
    const n = S.contracts.filter(x=>x.prod==="ดูแลกัน" && !x.legacy).indexOf(c)+1;
    return `กบข.นข.-สกก(ดูแลกัน)-D${String(n||1).padStart(3,"0")}/2569`;
  }
  const mm = (c.d||"2026-01-01").split("-")[1];
  const n = S.contracts.filter(x=>x.prod==="สามัญ" && !x.legacy && (x.d||"").slice(0,7)===(c.d||"").slice(0,7)).indexOf(c)+1;
  return `กบขนข-${yr}/${c.no}-${mm}-${String(n||1).padStart(2,"0")}-${yr}`;
}

function dl(name, text, type){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text],{type}));
  a.download = name; a.click();
}

    contracts:S.contracts, tx:S.tx, profile:S.profile, assign:S.assign,

  const q = v => `"${String(v??"").replace(/"/g,'""')}"`;
  let out = "\uFEFF";
  out += "== ทะเบียนสัญญา ==\n";
  out += ["เลขสมาชิก","ชื่อ","ผลิตภัณฑ์","วิธีคิดดอกเบี้ย","เลขที่สัญญา","วันที่","วงเงิน","งวด","งวดละ","หุ้น/เดือน","ยกมา","คงเหลือ","สถานะ"].map(q).join(",")+"\n";
  S.contracts.forEach(c=>{ const m=DB.members.find(z=>z.no===c.no), r=runContract(c);
    out += [c.no,m?m.name:"",c.prod,PROD[c.prod].method==="flat"?"Flat":"ลดต้นลดดอก",c.code,c.d,c.amt,c.terms,c.inst,c.shareM,c.legacy?c.open:"",r.bal.toFixed(2),r.status].map(q).join(",")+"\n"; });
  out += "\n== การจัดสรรรายงวด ==\n";
  out += ["เลขสมาชิก","ชื่อ","ผลิตภัณฑ์","งวด","รับชำระ","ดอกเบี้ย","ฝากหุ้น","เงินต้น","คงเหลือ","หมายเหตุ"].map(q).join(",")+"\n";
  S.contracts.forEach(c=>{ const m=DB.members.find(z=>z.no===c.no);
    runContract(c).rows.forEach(w=>{ if(w.pre||w.done) return;
      out += [c.no,m?m.name:"",c.prod,PLBL[w.p],(w.got||0).toFixed(2),(w.int||0).toFixed(2),
        (w.sh||0).toFixed(2),(w.pri||0).toFixed(2),(w.bal||0).toFixed(2),
        w.miss?"ไม่มีเงินเข้า":(w.note||"")].map(q).join(",")+"\n"; }); });
  out += "\n== รายการรับโอน ==\n";
  out += ["วันที่","เวลา","บัญชีผู้โอน","ชื่อในสเตทเมนท์","เลขสมาชิก","ชื่อ","ยอด","งวด","เข้าสัญญา"].map(q).join(",")+"\n";
  S.tx.slice().sort((a,b)=>a.d<b.d?-1:1).forEach(t=>{ const no=memOf(t), m=DB.members.find(z=>z.no===no),
    a=autoAssign(t), c=S.contracts.find(x=>x.id===a);
    out += [t.d,t.t,t.a,DB.anames[t.a]||"",no||"",m?m.name:"",t.m.toFixed(2),PLBL[periodOf(t.d)]||"",
      a==="share"?"ฝากหุ้น":(c?c.prod:"ยังไม่ระบุ")].map(q).join(",")+"\n"; });
  dl(`kbk-${new Date().toISOString().slice(0,10)}.csv`, out, "text/csv;charset=utf-8");
};
$("impBtn").onclick = () => $("imp").click();
$("imp").onchange = e => { const fr = new FileReader();
  fr.onload = () => { try{
      const j = JSON.parse(fr.result);
      if(j.members) DB.members = j.members;
      if(j.anames)  DB.anames  = j.anames;
      if(j.acct)    { DB.acct = {...j.acct}; S.acct = {...j.acct}; }
      if(j.wd)      DB.wd = j.wd;
      if(j.contracts) S.contracts = j.contracts;
      if(j.tx)        S.tx = j.tx;
      if(j.profile)   S.profile = j.profile;
      ["assign","per","rule","cut"].forEach(k=>{ if(j[k]!==undefined) S[k]=j[k]; });
      sel=null; all();
      setStatus("นำเข้าแล้ว · " + (DB.members.length||0) + " สมาชิก · " + (S.tx.length||0) + " รายการโอน"
        + (inGAS ? " — กำลังบันทึกขึ้น Google Sheets…" : ""));
      if(inGAS) doSave();
    } catch(err){ alert("ไฟล์ไม่ถูกต้อง: " + err.message); } };
  fr.readAsText(e.target.files[0]); };


/* ============ เริ่มระบบ ============ */
const inGAS = typeof google !== "undefined" && google.script && google.script.run;
function gas(fn, ...a){ return new Promise((ok,no)=>
  google.script.run.withSuccessHandler(ok).withFailureHandler(no)[fn](...a)); }
function setStatus(t){ const e=$("saved"); if(e) e.textContent = t; }
const EMPTY = {members:[], tx:[], acct:{}, anames:{}, contracts:[], wd:[], profile:{}};

async function boot(){
  if(inGAS){
    setStatus("กำลังโหลดข้อมูลจาก Google Sheets…");
    try{
      const r = JSON.parse(await gas("getData"));
      DB = Object.assign({}, EMPTY, r.db||{});
      S  = Object.assign(freshS(), r.state||{});
      setStatus("โหลดจาก Google Sheets แล้ว · " + DB.members.length + " สมาชิก");
    }catch(e){
      DB = {...EMPTY}; S = freshS();
      setStatus("⚠ อ่าน Google Sheets ไม่ได้: " + (e.message||e));
    }
  } else {
    DB = {...EMPTY}; S = freshS();
    setStatus("โหมดเปิดไฟล์ตรง — ยังไม่มีข้อมูล กด «นำเข้า» เพื่อโหลดไฟล์ JSON สำรอง");
  }
  draw();
}
function draw(){ drawT1(); drawT2(); drawT3(); drawT4(); drawT5(); drawT6(); drawT7(); drawT8(); drawT9(); }

/* ============ เดินระบบ ============ */
function all(){ drawT1(); drawT2(); drawT3(); drawT4(); drawT5(); drawT6(); drawT7(); drawT8(); drawT9(); save(); }
document.querySelectorAll("nav b").forEach(b => b.onclick = () => {
  tab = +b.dataset.t;
  document.querySelectorAll("nav b").forEach(x=>x.classList.toggle("on", x===b));
  document.querySelectorAll("section").forEach(s=>s.classList.toggle("on", s.id==="tab"+tab));
});
boot();
